version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: thesis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/thesis_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/thesis_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/thesis_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
