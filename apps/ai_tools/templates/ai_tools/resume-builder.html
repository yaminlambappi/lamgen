{% extends 'base.html' %}

{% block title %}AI Resume Builder{% endblock %}

{% block content %}
<div class="container">
    <h1>AI Resume Builder</h1>
    <form id="resume-builder-form">
        <div class="form-group">
            <label for="prompt">Enter your details:</label>
            <textarea class="form-control" id="prompt" rows="10"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Generate Resume</button>
    </form>
    <div id="output" class="mt-4">
        <h2>Generated Resume:</h2>
        <pre id="resume-output"></pre>
    </div>
</div>

<script>
    document.getElementById('resume-builder-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const prompt = document.getElementById('prompt').value;
        const response = await fetch('/api/ai-tools/resume-builder/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ prompt: prompt })
        });
        const data = await response.json();
        document.getElementById('resume-output').textContent = data.output;
    });
</script>
{% endblock %}
