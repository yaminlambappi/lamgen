{# Ad slot placeholder — inject ad network script to target data-ad-slot attribute #}
<div
  class="ad-slot"
  data-ad-slot="{{ slot_id|default:'default' }}"
  aria-hidden="true"
  style="min-height:90px; background:rgba(255,255,255,0.015); border:1px dashed rgba(255,255,255,0.06); border-radius:12px; display:flex; align-items:center; justify-content:center; margin:1.5rem 0; position:relative; overflow:hidden;"
>
  <span style="font-size:0.7rem; color:rgba(255,255,255,0.15); text-transform:uppercase; letter-spacing:1px; position:absolute; top:6px; right:10px;">Ad</span>
</div>
