{% load static %}
<!-- Google Fonts with font-display: swap and preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" onerror="console.error('Failed to load Google Fonts')">

<!-- Bootstrap Icons — loaded synchronously so icons render on first paint -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" onerror="this.onerror=null;this.href='/static/css/bootstrap-icons.min.css';">

<!-- Main CSS loaded synchronously to prevent CLS/FOUC -->
<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/design-system.css' %}">

{% block perf_prefetch %}{% endblock %}
