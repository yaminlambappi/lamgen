{% load tool_tags %}
{% with is_bm=tool.slug|is_bookmarked:bookmarked_slugs %}
<a href="{{ tool.get_absolute_url }}"
   class="tool-card"
   aria-label="{{ tool.name }}: {{ tool.short_desc }}"
   style="display:flex; flex-direction:column; gap:10px; padding:1.1rem 1.2rem; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:16px; text-decoration:none; color:var(--text); transition:all 0.2s cubic-bezier(0.4,0,0.2,1); position:relative; overflow:hidden;"
   onmouseover="this.style.background='rgba(255,255,255,0.06)'; this.style.borderColor='rgba(255,255,255,0.14)'; this.style.transform='translateY(-2px)';"
   onmouseout="this.style.background='rgba(255,255,255,0.03)'; this.style.borderColor='rgba(255,255,255,0.07)'; this.style.transform='translateY(0)';">

  {% if tool.is_new %}
    <span style="position:absolute; top:10px; right:10px; font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; background:rgba(0,245,212,0.15); color:var(--accent); border:1px solid rgba(0,245,212,0.3); border-radius:50px; padding:2px 8px;">New</span>
  {% elif tool.is_featured %}
    <span style="position:absolute; top:10px; right:10px; font-size:0.65rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; background:rgba(108,99,255,0.15); color:var(--primary); border:1px solid rgba(108,99,255,0.3); border-radius:50px; padding:2px 8px;">Featured</span>
  {% endif %}

  <div style="display:flex; align-items:center; gap:10px;">
    <div style="width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; {% tool_icon_bg tool.category %}">
      <i class="{{ tool.icon }}" style="color:{{ tool.category.color_from }};"></i>
    </div>
    <div style="min-width:0;">
      <div style="font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ tool.name }}</div>
    </div>
  </div>

  <p style="font-size:0.8rem; color:var(--muted); line-height:1.4; margin:0; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">{{ tool.short_desc }}</p>
</a>
{% endwith %}
