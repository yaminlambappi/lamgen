{% load tool_tags %}
<a href="{{ category.get_absolute_url }}"
   class="category-card"
   aria-label="{{ category.name }} — {{ category.short_desc }}"
   style="display:flex; flex-direction:column; gap:12px; padding:1.4rem; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:18px; text-decoration:none; color:var(--text); transition:all 0.25s cubic-bezier(0.4,0,0.2,1); position:relative; overflow:hidden;"
   onmouseover="this.style.background='rgba(255,255,255,0.055)'; this.style.borderColor='rgba(255,255,255,0.13)'; this.style.transform='translateY(-3px)';"
   onmouseout="this.style.background='rgba(255,255,255,0.03)'; this.style.borderColor='rgba(255,255,255,0.07)'; this.style.transform='translateY(0)';">

  <div style="position:absolute; inset:0; background:linear-gradient(135deg, {{ category.color_from }}08, {{ category.color_to }}04); pointer-events:none;"></div>

  <div style="display:flex; align-items:center; gap:12px;">
    <div style="width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; background:linear-gradient(135deg, {{ category.color_from }}22, {{ category.color_to }}22); border:1px solid {{ category.color_from }}44; flex-shrink:0;">
      <i class="{{ category.icon }}" style="background:linear-gradient(135deg, {{ category.color_from }}, {{ category.color_to }}); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></i>
    </div>
    <div>
      <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:0.95rem;">{{ category.name }}</div>
      <div style="font-size:0.75rem; color:var(--muted);">{{ category.tools.count }} tools</div>
    </div>
  </div>

  {% if category.short_desc %}
    <p style="font-size:0.82rem; color:var(--muted); line-height:1.4; margin:0;">{{ category.short_desc }}</p>
  {% endif %}
</a>
