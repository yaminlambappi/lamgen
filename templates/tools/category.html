{% extends "base.html" %}

{% block extra_css %}
<style>
    .category-shell {
        width: 100%;
        padding: 0 1rem;
    }
    .category-header {
        margin-bottom: 4rem;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }
    .category-title h1 {
        font-family: 'Syne', sans-serif;
        font-size: 3.5rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }
    .category-title p {
        font-size: 1.1rem;
        color: var(--muted);
        max-width: 600px;
    }

    .tool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1.5rem;
        perspective: 1200px;
    }

    .tool-card {
        background: rgba(255, 255, 255, 0.02);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        padding: 1.5rem;
        text-decoration: none;
        color: var(--text);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        gap: 1rem;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(20px);
        transform-style: preserve-3d;
    }

    .tool-card:hover {
        background: rgba(255, 255, 255, 0.04);
        transform: translateY(-8px) rotateX(4deg) rotateY(4deg);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 20px 40px rgba(0,0,0,0.5);
    }

    /* ── Alien Silhouette Shapes ── */
    .tool-card[data-shape="developer"] {
        clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
        border-radius: 4px;
    }
    .tool-card[data-shape="media"] {
        border-radius: 24px 8px 24px 8px;
    }
    .tool-card[data-shape="student"] {
        border-radius: 20px;
    }
    .tool-card[data-shape="seo"] {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        border-radius: 4px;
    }
    .tool-card[data-shape="viral"] {
        clip-path: polygon(0 16px, 16px 0, 100% 0, 100% 100%, 0 100%);
        border-radius: 6px;
    }
    .tool-card[data-shape="utility"] {
        clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
        border-radius: 4px;
    }

    .tool-card::before {
        content: '';
        position: absolute;
        top: 0; right: 0;
        width: 150px; height: 150px;
        background: radial-gradient(circle at top right, {{ category.color_from|default:"var(--primary)" }}, transparent 70%);
        opacity: 0.05;
        transition: opacity 0.4s;
    }
    .tool-card:hover::before { opacity: 0.2; }

    .tool-icon-wrapper {
        width: 60px;
        height: 60px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: {{ category.color_from|default:"var(--primary)" }};
        transition: all 0.4s;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        transform: translateZ(20px);
    }
    .tool-card:hover .tool-icon-wrapper {
        border-color: {{ category.color_from|default:"var(--primary)" }};
        color: #fff;
        background: {{ category.color_from|default:"var(--primary)" }};
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .tool-info h3 { font-family: 'Syne'; font-weight: 700; font-size: 1.4rem; margin-bottom: 0.5rem; transform: translateZ(15px); }
    .tool-info p { font-size: 0.95rem; color: var(--muted); line-height: 1.6; transform: translateZ(10px); }

    .tool-meta {
        margin-top: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--muted);
    }

    @media (max-width: 768px) {
        .category-title h1 { font-size: 2.5rem; }
        .category-shell { padding: 2rem 1.5rem; }
    }
</style>
{% endblock %}

{% block content %}
<div class="category-shell">
    <header class="category-header">
        <div class="category-title">
            <div style="display: flex; align-items: center; gap: 10px; color: var(--primary); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">
                <i class="{{ category.icon }}"></i> Workspace
            </div>
            <h1>{{ category.name }}</h1>
            <p>{{ category.description }}</p>
        </div>
        <div class="category-stats" style="text-align: right;">
            <div style="font-size: 2rem; font-weight: 800; font-family: 'Syne'; color: var(--text);">{{ tools.count }}</div>
            <div style="font-size: 0.8rem; color: var(--muted); text-transform: uppercase;">Workflows</div>
        </div>
    </header>

    <div class="tool-grid">
        {% for tool in tools %}
        <a href="{{ tool.get_absolute_url }}" class="tool-card" data-shape="{{ category.slug }}">
            <div class="tool-icon-wrapper">
                <i class="{{ tool.icon }}"></i>
            </div>
            <div class="tool-info">
                <h3>{{ tool.name }}</h3>
                <p>{{ tool.short_desc }}</p>
            </div>
            <div class="tool-meta">
                <span><i class="bi bi-lightning-charge"></i> Instant Browser Execution</span>
                <i class="bi bi-arrow-right"></i>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
