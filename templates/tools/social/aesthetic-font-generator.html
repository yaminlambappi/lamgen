{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
.tool-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 0.4rem; display: block; }
.num-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; border-radius: 8px; outline: none; font-family: 'DM Sans', sans-serif; font-size: 1.1rem; transition: border-color 0.2s; }
.num-input:focus { border-color: var(--primary); }
.input-grp { margin-bottom: 1.5rem; }
.btn-sm { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--text); padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
.btn-sm:hover { border-color: var(--primary); color: var(--primary); }
.font-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.2rem; margin-bottom: 0.7rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: border-color 0.2s; }
.font-card:hover { border-color: rgba(108,99,255,0.4); }
.font-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
.font-output { font-size: 1.2rem; word-break: break-all; color: var(--text); }
.results-grid { columns: 1; }
.copy-all-btn { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; font-weight: 700; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: transform 0.2s; }
.copy-all-btn:hover { transform: translateY(-2px); }
</style>
{% endblock %}

{% block tool_content %}
<div class="input-grp">
  <span class="tool-label">Your Text</span>
  <input type="text" id="in-text" class="num-input" placeholder="Type something…" value="Hello World">
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
  <span class="tool-label" style="margin:0;">All Styles (20+)</span>
  <button class="copy-all-btn" id="btn-copy-all">📋 Copy All Styles</button>
</div>
<div id="results"></div>
{% endblock %}

    monospace: '𝙰𝙱𝙲𝙳𝙴𝙵𝙶𝙷𝙸𝙹𝙺𝙻𝙼𝙽𝙾𝙿𝚀𝚁𝚂𝚃𝚄𝚅𝚆𝚇𝚈𝚉𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣𝟶𝟷𝟸𝟹𝟺𝟻𝟼𝟽𝟾𝟿',
    sansSerif: '𝖠𝖡𝖢𝖣𝖤𝖥𝖦𝖧𝖨𝖩𝖪𝖫𝖬𝖭𝖮𝖯𝖰𝖱𝖲𝖳𝖴𝖵𝖶𝖷𝖸𝖹𝖺𝖻𝖼𝖽𝖾𝖿𝗀𝗁𝗂𝗃𝗄𝗅𝗆𝗇𝗈𝗉𝗊𝗋𝗌𝗍𝗎𝗏𝗐𝗑𝗒𝗓𝟢𝟣𝟤𝟥𝟦𝟧𝟨𝟩𝟪𝟫',
    boldSans: '𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵',
    italicSans: '𝘈𝘉𝘊𝘋𝘌𝘍𝘎𝘏𝘐𝘑𝘒𝘓𝘔𝘕𝘖𝘗𝘘𝘙𝘚𝘛𝘜𝘝𝘞𝘟𝘠𝘡𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝘬𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻0123456789',
    boldItalicSans: '𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯0123456789',
  };

  const styles = [
    { name: 'Bold Serif', key: 'bold' },
    { name: 'Italic Serif', key: 'italic' },
    { name: 'Bold Italic Serif', key: 'boldItalic' },
    { name: 'Cursive / Script', key: 'cursive' },
    { name: 'Bold Cursive', key: 'boldCursive' },
    { name: 'Fraktur / Gothic', key: 'fraktur' },
    { name: 'Bold Fraktur', key: 'boldFraktur' },
    { name: 'Double Struck', key: 'doubleStruck' },
    { name: 'Monospace', key: 'monospace' },
    { name: 'Sans-Serif', key: 'sansSerif' },
    { name: 'Bold Sans', key: 'boldSans' },
    { name: 'Italic Sans', key: 'italicSans' },
    { name: 'Bold Italic Sans', key: 'boldItalicSans' },
    { name: 'Vaporwave (Ｗｉｄｅ)', key: 'vaporwave' },
    { name: 'Bubble ⓣⓔⓧⓣ', key: 'bubble' },
    { name: 'Bubble Filled', key: 'bubbleFilled' },
    { name: 'Small Caps', key: 'smallCaps' },
    { name: 'Upside Down', key: 'upsideDown' },
    { name: 'Strikethrough', key: 'strikethrough' },
    { name: 'Underline', key: 'underline' },
    { name: 'Superscript', key: 'superscript' },
    { name: 'Subscript', key: 'subscript' },
  ];

  const specialMaps = {
    vaporwave: { from: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789', to: 'ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ０１２３４５６７８９' },
    bubble: { from: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789', to: 'ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ⓪①②③④⑤⑥⑦⑧⑨' },
    bubbleFilled: { from: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789', to: '🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩0123456789' },
    smallCaps: { from: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ', to: 'ᴀʙᴄᴅᴇꜰɢʜɪᴊᴋʟᴍɴᴏᴘǫʀsᴛᴜᴠᴡxʏᴢABCDEFGHIJKLMNOPQRSTUVWXYZ' },
    upsideDown: { from: 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', to: 'ɐqɔpǝɟƃɥᴉɾʞlɯuodbɹsʇnʌʍxʎzɐqɔpǝɟƃɥᴉɾʞlɯuodbɹsʇnʌʍxʎz0ƖᄅƐㄣϛ9ㄥ86' },
  };

  function convertChar(char, key) {
    if (maps[key]) {
      const from = maps.normal;
      const to = maps[key];
      const idx = from.indexOf(char);
      if (idx !== -1) {
        const toChars = [...to];
        const fromChars = [...from];
        const toIdx = fromChars.indexOf(char);
        if (toIdx !== -1) return toChars[toIdx] || char;
        return char;
      }
      return char;
    }
    if (specialMaps[key]) {
      const { from, to } = specialMaps[key];
      const fromArr = [...from];
      const toArr = [...to];
      const idx = fromArr.indexOf(char);
      return idx !== -1 ? (toArr[idx] || char) : char;
    }
    return char;
  }

  function convertText(text, key) {
    if (key === 'strikethrough') return [...text].map(c => c + '\u0336').join('');
    if (key === 'underline') return [...text].map(c => c + '\u0332').join('');
    if (key === 'superscript') {
      const sup = { a:'ᵃ',b:'ᵇ',c:'ᶜ',d:'ᵈ',e:'ᵉ',f:'ᶠ',g:'ᵍ',h:'ʰ',i:'ⁱ',j:'ʲ',k:'ᵏ',l:'ˡ',m:'ᵐ',n:'ⁿ',o:'ᵒ',p:'ᵖ',r:'ʳ',s:'ˢ',t:'ᵗ',u:'ᵘ',v:'ᵛ',w:'ʷ',x:'ˣ',y:'ʸ',z:'ᶻ','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹' };
      return [...text].map(c => sup[c.toLowerCase()] || c).join('');
    }
    if (key === 'subscript') {
      const sub = { a:'ₐ',e:'ₑ',h:'ₕ',i:'ᵢ',j:'ⱼ',k:'ₖ',l:'ₗ',m:'ₘ',n:'ₙ',o:'ₒ',p:'ₚ',r:'ᵣ',s:'ₛ',t:'ₜ',u:'ᵤ',v:'ᵥ',x:'ₓ','0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉' };
      return [...text].map(c => sub[c.toLowerCase()] || c).join('');
    }
    if (maps[key]) {
      const from = [...maps.normal];
      const to = [...maps[key]];
      return [...text].map(c => {
        const idx = from.indexOf(c);
        return idx !== -1 ? (to[idx] || c) : c;
      }).join('');
    }
    if (specialMaps[key]) {
      const { from, to } = specialMaps[key];
      const fromArr = [...from];
      const toArr = [...to];
      return [...text].map(c => {
        const idx = fromArr.indexOf(c);
        return idx !== -1 ? (toArr[idx] || c) : c;
      }).join('');
    }
    return text;
  }

  function update() {
    const text = document.getElementById('in-text').value;
    if (!text) { document.getElementById('results').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem;">Type something above</div>'; return; }
    document.getElementById('results').innerHTML = styles.map(s => {
      const converted = convertText(text, s.key);
      return `<div class="font-card">
        <div style="flex:1;">
          <div class="font-label">${s.name}</div>
          <div class="font-output">${converted}</div>
        </div>
        <button class="btn-sm" onclick="copyText(this,\`${converted.replace(/`/g,'\\`')}\`)"><i class="bi bi-clipboard"></i></button>
      </div>`;
    }).join('');
  }

  window.copyText = async (btn, text) => {
    await navigator.clipboard.writeText(text);
    btn.innerHTML = '<i class="bi bi-check"></i>';
    setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard"></i>', 1500);
  };

  document.getElementById('in-text').addEventListener('input', update);

  document.getElementById('btn-copy-all').addEventListener('click', async () => {
    const text = document.getElementById('in-text').value;
    const all = styles.map(s => `${s.name}: ${convertText(text, s.key)}`).join('\n');
    await navigator.clipboard.writeText(all);
    const btn = document.getElementById('btn-copy-all');
    btn.textContent = '✓ Copied All!';
    setTimeout(() => btn.textContent = '📋 Copy All Styles', 1500);
  });

  update();
});
</script>
{% endblock %}
