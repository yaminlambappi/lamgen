{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.num-input,.select-input,.text-input{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;box-sizing:border-box;transition:border-color .2s}
.num-input:focus,.select-input:focus,.text-input:focus{border-color:var(--primary)}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-3{grid-template-columns:1fr}}
.timer-circle-wrap{display:flex;justify-content:center;align-items:center;padding:20px}
.timer-circle{position:relative;width:200px;height:200px}
.timer-circle svg{transform:rotate(-90deg)}
.timer-circle .bg-circle{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8}
.timer-circle .progress-circle{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s,stroke .3s}
.timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-time{font-size:2.5rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.timer-phase{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.session-dots{display:flex;gap:6px;justify-content:center;margin-top:8px}
.session-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.1);transition:background .3s}
.session-dot.done{background:var(--primary)}
.session-dot.current{background:var(--accent)}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(255,255,255,.03);border-radius:8px;font-size:.82rem}
.phase-work{color:var(--accent)}
.phase-short{color:#FFC107}
.phase-long{color:#81C784}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div>
    <div class="tool-label">Task Name</div>
    <input type="text" class="text-input" id="task-name" placeholder="What are you working on?">
  </div>

  <div class="grid-3">
    <div>
      <div class="tool-label">Work (min)</div>
      <input type="number" class="num-input" id="work-min" value="25" min="1" max="60">
    </div>
    <div>
      <div class="tool-label">Short Break (min)</div>
      <input type="number" class="num-input" id="short-min" value="5" min="1" max="30">
    </div>
    <div>
      <div class="tool-label">Long Break (min)</div>
      <input type="number" class="num-input" id="long-min" value="15" min="5" max="60">
    </div>
  </div>

  <div class="timer-circle-wrap">
    <div class="timer-circle">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="bg-circle" cx="100" cy="100" r="88"/>
        <circle class="progress-circle" id="progress-circle" cx="100" cy="100" r="88"
          stroke="var(--accent)"
          stroke-dasharray="553"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <div class="timer-time" id="timer-display">25:00</div>
        <div class="timer-phase" id="timer-phase">Work</div>
      </div>
    </div>
  </div>

  <div class="session-dots" id="session-dots">
    <div class="session-dot current"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
    <div class="session-dot"></div>
  </div>

  <div class="act-row" style="justify-content:center">
    <button class="btn-go" id="btn-start" onclick="toggleTimer()"><i class="bi bi-play-fill"></i> Start</button>
    <button class="btn-sm" onclick="resetTimer()"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
    <button class="btn-sm" onclick="skipPhase()"><i class="bi bi-skip-forward-fill"></i> Skip</button>
  </div>

  <div>
    <div class="tool-label">Session History</div>
    <div id="session-history" style="display:flex;flex-direction:column;gap:4px"></div>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
let timerInterval = null;
let running = false;
let timeLeft = 0;
let totalTime = 0;
let phase = 'work'; // work, short, long
let pomodoroCount = 0;
let sessionHistory = [];

const CIRCUMFERENCE = 2 * Math.PI * 88;

function getPhaseTime() {
  if (phase === 'work') return parseInt(document.getElementById('work-min').value) * 60;
  if (phase === 'short') return parseInt(document.getElementById('short-min').value) * 60;
  return parseInt(document.getElementById('long-min').value) * 60;
}

function getPhaseLabel() {
  if (phase === 'work') return 'Work';
  if (phase === 'short') return 'Short Break';
  return 'Long Break';
}

function getPhaseColor() {
  if (phase === 'work') return 'var(--accent)';
  if (phase === 'short') return '#FFC107';
  return '#81C784';
}

function updateDisplay() {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  document.getElementById('timer-display').textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
  document.getElementById('timer-phase').textContent = getPhaseLabel();
  const progress = totalTime > 0 ? (timeLeft / totalTime) : 1;
  const offset = CIRCUMFERENCE * (1 - progress);
  const circle = document.getElementById('progress-circle');
  circle.style.strokeDashoffset = offset;
  circle.style.stroke = getPhaseColor();
  document.getElementById('timer-display').style.color = getPhaseColor();
  updateDots();
}

function updateDots() {
  const dots = document.querySelectorAll('.session-dot');
  dots.forEach((dot, i) => {
    dot.className = 'session-dot';
    if (i < pomodoroCount % 4) dot.classList.add('done');
    else if (i === pomodoroCount % 4 && phase === 'work') dot.classList.add('current');
  });
}

function beep(freq=880, dur=0.5) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function tick() {
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    running = false;
    beep(660, 0.8);
    const task = document.getElementById('task-name').value || 'Task';
    sessionHistory.unshift({phase: getPhaseLabel(), task, time: new Date().toLocaleTimeString()});
    if (sessionHistory.length > 20) sessionHistory.pop();
    renderHistory();
    if (phase === 'work') {
      pomodoroCount++;
      phase = pomodoroCount % 4 === 0 ? 'long' : 'short';
    } else {
      phase = 'work';
    }
    totalTime = getPhaseTime();
    timeLeft = totalTime;
    updateDisplay();
    document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Start';
    return;
  }
  timeLeft--;
  updateDisplay();
}

function toggleTimer() {
  if (running) {
    clearInterval(timerInterval);
    running = false;
    document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Resume';
  } else {
    if (timeLeft === 0) {
      totalTime = getPhaseTime();
      timeLeft = totalTime;
    }
    running = true;
    timerInterval = setInterval(tick, 1000);
    document.getElementById('btn-start').innerHTML = '<i class="bi bi-pause-fill"></i> Pause';
    updateDisplay();
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  phase = 'work';
  pomodoroCount = 0;
  totalTime = getPhaseTime();
  timeLeft = totalTime;
  document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Start';
  updateDisplay();
}

function skipPhase() {
  clearInterval(timerInterval);
  running = false;
  if (phase === 'work') {
    pomodoroCount++;
    phase = pomodoroCount % 4 === 0 ? 'long' : 'short';
  } else {
    phase = 'work';
  }
  totalTime = getPhaseTime();
  timeLeft = totalTime;
  document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Start';
  updateDisplay();
}

function renderHistory() {
  const container = document.getElementById('session-history');
  if (!sessionHistory.length) { container.innerHTML = ''; return; }
  container.innerHTML = sessionHistory.map(h => `
    <div class="history-item">
      <span class="phase-${h.phase==='Work'?'work':h.phase.includes('Short')?'short':'long'}">${h.phase}</span>
      <span style="color:var(--muted)">${h.task}</span>
      <span style="color:var(--muted);font-size:.72rem">${h.time}</span>
    </div>
  `).join('');
}

// Init
totalTime = getPhaseTime();
timeLeft = totalTime;
document.getElementById('progress-circle').style.strokeDasharray = CIRCUMFERENCE;
updateDisplay();
</script>
{% endblock %}
