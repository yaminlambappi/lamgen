{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.result-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;text-align:center}
.result-big{font-size:2.5rem;font-weight:800;font-family:'Syne',sans-serif;color:var(--accent);margin-bottom:.25rem}
.result-label{font-size:.8rem;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
.num-input,.select-input,.text-input{width:100%;padding:8px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;box-sizing:border-box;transition:border-color .2s}
.num-input:focus,.select-input:focus,.text-input:focus{border-color:var(--primary)}
.sem-table{width:100%;border-collapse:collapse}
.sem-table th{text-align:left;padding:8px 10px;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid rgba(255,255,255,.06)}
.sem-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04)}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar{width:100%;background:linear-gradient(180deg,var(--primary),rgba(108,99,255,.3));border-radius:4px 4px 0 0;transition:height .4s;min-height:4px}
.bar-label{font-size:.65rem;color:var(--muted);text-align:center}
.bar-val{font-size:.7rem;color:var(--accent);font-weight:700}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div>
    <div class="tool-label">Semesters</div>
    <div style="overflow-x:auto">
      <table class="sem-table">
        <thead><tr><th>Semester</th><th>GPA</th><th>Credit Hours</th><th></th></tr></thead>
        <tbody id="sem-tbody"></tbody>
      </table>
    </div>
    <button class="btn-sm" onclick="addSemRow()" style="margin-top:8px"><i class="bi bi-plus"></i> Add Semester</button>
  </div>

  <div class="act-row">
    <button class="btn-go" onclick="calcCGPA()"><i class="bi bi-calculator"></i> Calculate CGPA</button>
    <button class="btn-sm" onclick="exportCGPA()"><i class="bi bi-download"></i> Export</button>
    <div class="status" id="status"></div>
  </div>

  <div id="cgpa-results" style="display:none">
    <div class="grid-3" style="margin-bottom:1rem">
      <div class="result-card"><div class="result-big" id="cgpa-val">—</div><div class="result-label">CGPA</div></div>
      <div class="result-card"><div class="result-big" id="total-creds">—</div><div class="result-label">Total Credits</div></div>
      <div class="result-card"><div class="result-big" id="sem-count">—</div><div class="result-label">Semesters</div></div>
    </div>
    <div>
      <div class="tool-label">GPA Trend</div>
      <div class="bar-chart" id="bar-chart"></div>
    </div>
    <div id="sem-breakdown" style="margin-top:1rem"></div>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function downloadText(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status err';
  el.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> ' + msg;
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status ok';
  el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + msg;
}

let semCount = 0;

function addSemRow() {
  semCount++;
  const tbody = document.getElementById('sem-tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" class="text-input" value="Semester ${semCount}" style="min-width:100px"></td>
    <td><input type="number" class="num-input" placeholder="e.g. 3.5" min="0" max="5" step="0.01" style="min-width:80px"></td>
    <td><input type="number" class="num-input" value="18" min="1" max="40" style="min-width:80px"></td>
    <td><button class="btn-sm" style="padding:5px 8px;color:#FF6B6B" onclick="this.closest('tr').remove()"><i class="bi bi-trash"></i></button></td>
  `;
  tbody.appendChild(tr);
}

function calcCGPA() {
  const rows = document.querySelectorAll('#sem-tbody tr');
  if (!rows.length) { showErr('status', 'Add at least one semester'); return; }
  let totalPoints = 0, totalCredits = 0;
  const semData = [];
  for (const row of rows) {
    const name = row.querySelectorAll('input')[0].value || 'Semester';
    const gpa = parseFloat(row.querySelectorAll('input')[1].value);
    const credits = parseFloat(row.querySelectorAll('input')[2].value) || 0;
    if (isNaN(gpa)) { showErr('status', 'Please enter valid GPA for all semesters'); return; }
    totalPoints += gpa * credits;
    totalCredits += credits;
    semData.push({name, gpa, credits});
  }
  if (!totalCredits) { showErr('status', 'Total credits cannot be zero'); return; }
  const cgpa = totalPoints / totalCredits;
  document.getElementById('cgpa-val').textContent = cgpa.toFixed(2);
  document.getElementById('total-creds').textContent = totalCredits;
  document.getElementById('sem-count').textContent = semData.length;
  document.getElementById('cgpa-results').style.display = 'block';

  // Bar chart
  const maxGPA = Math.max(...semData.map(s => s.gpa), 4.0);
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = semData.map(s => {
    const pct = (s.gpa / maxGPA) * 100;
    return `<div class="bar-wrap">
      <div class="bar-val">${s.gpa.toFixed(2)}</div>
      <div class="bar" style="height:${pct}%"></div>
      <div class="bar-label">${s.name.replace('Semester ','S')}</div>
    </div>`;
  }).join('');

  // Breakdown
  let cumPoints = 0, cumCredits = 0;
  const breakdown = document.getElementById('sem-breakdown');
  breakdown.innerHTML = '<div class="tool-label">Semester Breakdown</div>' + semData.map(s => {
    cumPoints += s.gpa * s.credits;
    cumCredits += s.credits;
    const cumGPA = cumPoints / cumCredits;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(255,255,255,.03);border-radius:8px;font-size:.85rem;margin-bottom:4px">
      <span>${s.name}</span>
      <span style="color:var(--muted)">GPA: <strong style="color:var(--text)">${s.gpa.toFixed(2)}</strong></span>
      <span style="color:var(--muted)">${s.credits} credits</span>
      <span style="color:var(--accent)">Cumulative: ${cumGPA.toFixed(2)}</span>
    </div>`;
  }).join('');

  showOk('status', 'CGPA calculated');
}

function exportCGPA() {
  const rows = document.querySelectorAll('#sem-tbody tr');
  if (!rows.length) return;
  let csv = 'Semester,GPA,Credits\n';
  for (const row of rows) {
    const name = row.querySelectorAll('input')[0].value;
    const gpa = row.querySelectorAll('input')[1].value;
    const credits = row.querySelectorAll('input')[2].value;
    csv += `${name},${gpa},${credits}\n`;
  }
  const cgpaEl = document.getElementById('cgpa-val');
  if (cgpaEl.textContent !== '—') csv += `\nCGPA,${cgpaEl.textContent}`;
  downloadText(csv, 'cgpa.csv', 'text/csv');
}

// Add 4 default semesters
for (let i = 0; i < 4; i++) addSemRow();

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') calcCGPA();
});
</script>
{% endblock %}
