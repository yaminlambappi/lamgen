{% extends "tools/tool_base.html" %}
{% block tool_content %}
<div class="dev-tool-wrap">
  <div class="grid-2">
    <label>Horizontal <input id="x" type="range" min="-100" max="100" value="10" oninput="render()"></label>
    <label>Vertical <input id="y" type="range" min="-100" max="100" value="10" oninput="render()"></label>
    <label>Blur <input id="blur" type="range" min="0" max="200" value="30" oninput="render()"></label>
    <label>Spread <input id="spread" type="range" min="-100" max="100" value="0" oninput="render()"></label>
    <label>Opacity <input id="op" type="range" min="0" max="100" value="30" oninput="render()"></label>
    <label>Color <input id="color" type="color" value="#6c63ff" oninput="render()"></label>
  </div>
  <label><input id="inset" type="checkbox" onchange="render()"> Inset</label>
  <div id="preview" style="height:180px;border-radius:16px;background:#fff;display:grid;place-items:center">
    <div id="box" style="width:110px;height:110px;background:#f4f4ff;border-radius:14px"></div>
  </div>
  <textarea id="out" class="tool-code out" readonly></textarea>
  <div class="act-row">
    <button class="btn-sm" onclick="copyOut()"><i class="bi bi-clipboard"></i> Copy CSS</button>
    <button class="btn-sm" onclick="resetTool()"><i class="bi bi-x-circle"></i> Reset</button>
  </div>
</div>
{% endblock %}
{% block tool_js %}
<script>
function hexToRgb(h){const x=h.replace("#","");return [parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)];}
function render(){
  const x=+document.getElementById("x").value,y=+document.getElementById("y").value,b=+document.getElementById("blur").value,s=+document.getElementById("spread").value,op=+document.getElementById("op").value/100,c=document.getElementById("color").value,inset=document.getElementById("inset").checked;
  const [r,g,bl]=hexToRgb(c);
  const css=`${inset?"inset ":""}${x}px ${y}px ${b}px ${s}px rgba(${r}, ${g}, ${bl}, ${op.toFixed(2)})`;
  document.getElementById("box").style.boxShadow=css;
  document.getElementById("out").value=`box-shadow: ${css};`;
}
function copyOut(){const v=document.getElementById("out").value;if(v)navigator.clipboard.writeText(v);}
function resetTool(){document.getElementById("x").value=10;document.getElementById("y").value=10;document.getElementById("blur").value=30;document.getElementById("spread").value=0;document.getElementById("op").value=30;document.getElementById("color").value="#6c63ff";document.getElementById("inset").checked=false;render();}
render();
</script>
{% endblock %}
