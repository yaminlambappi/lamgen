{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; height: 600px; }
    .editor-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; display: flex; flex-direction: column; }
    .editor-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
    .editor-textarea { width: 100%; flex-grow: 1; background: #0A0A0F; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 1rem; font-family: monospace; font-size: 0.95rem; resize: none; outline: none; }
    .editor-textarea:focus { border-color: var(--primary); }
    
    .preview-box { background: #FFFFFF; border: 1px solid var(--border); border-radius: 8px; color: #000; padding: 1.5rem; overflow-y: auto; flex-grow: 1; }
    
    /* Markdown Preview Styles */
    .preview-box h1, .preview-box h2, .preview-box h3 { margin-top: 1.5rem; margin-bottom: 1rem; font-family: 'DM Sans', sans-serif; }
    .preview-box p { margin-bottom: 1rem; line-height: 1.6; }
    .preview-box code { background: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
    .preview-box pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; }
    .preview-box pre code { background: transparent; padding: 0; }
    .preview-box blockquote { border-left: 4px solid #ddd; padding-left: 1rem; color: #666; margin-bottom: 1rem; }
    .preview-box ul, .preview-box ol { margin-left: 1.5rem; margin-bottom: 1rem; }

    @media (max-width: 768px) {
        .split-grid { grid-template-columns: 1fr; height: auto; min-height: 800px; }
    }
</style>
{% endblock %}

{% block tool_content %}
<div class="split-grid">
    <div class="editor-box">
        <div class="editor-label">
            <span>Markdown Input</span>
            <div>
                <button class="btn-ghost-nexus btn-sm" id="btn-demo"><i class="bi bi-magic"></i> Demo</button>
                <button class="btn-ghost-nexus btn-sm" id="btn-clear"><i class="bi bi-trash"></i> Clear</button>
            </div>
        </div>
        <textarea id="md-input" class="editor-textarea" placeholder="Type markdown here..."></textarea>
    </div>
    
    <div class="editor-box">
        <div class="editor-label">
            <span>HTML Preview</span>
            <button class="btn-ghost-nexus btn-sm" id="btn-export"><i class="bi bi-download"></i> Export HTML</button>
        </div>
        <div id="md-output" class="preview-box">
            <div style="color: #666; font-style: italic;">Preview will appear here...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block tool_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('md-input');
        const output = document.getElementById('md-output');
        
        const demoText = `# Markdown Previewer
## Welcome to LamGen Tools
This is a **live** markdown previewer running entirely in your browser.

### Features:
- Real-time rendering
- GitHub flavored markdown support
- HTML Export
- **100% Offline processing**

### Code Example:
\`\`\`javascript
function greet() {
    console.log("Hello World!");
}
\`\`\`

> "Simplicity is the soul of efficiency." — Austin Freeman

[Visit LamGen](https://lamgen.tools) for more utilities.`;

        function updatePreview() {
            const val = input.value;
            if (!val.trim()) {
                output.innerHTML = '<div style="color: #666; font-style: italic;">Preview will appear here...</div>';
                return;
            }
            output.innerHTML = marked.parse(val);
        }

        input.addEventListener('input', updatePreview);

        document.getElementById('btn-demo').addEventListener('click', () => {
            input.value = demoText;
            updatePreview();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            input.value = '';
            updatePreview();
            input.focus();
        });

        document.getElementById('btn-export').addEventListener('click', () => {
            const htmlContent = output.innerHTML;
            if (!htmlContent || htmlContent.includes('Preview will appear here')) return;
            
            const fullHtml = `<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Markdown Export</title>
<style>
body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; line-height: 1.6; }
code { background: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow-x: auto; }
pre code { background: transparent; padding: 0; }
blockquote { border-left: 4px solid #ddd; padding-left: 1rem; color: #666; }
</style>
</head>
<body>
${htmlContent}
</body>
</html>`;
            
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'export.html';
            a.click();
            URL.revokeObjectURL(url);
        });
    });
</script>
{% endblock %}
