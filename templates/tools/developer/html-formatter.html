{% extends "tools/tool_base.html" %}
{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.tool-code{width:100%;min-height:220px;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s;box-sizing:border-box}
.tool-code:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.tool-code::placeholder{color:rgba(255,255,255,.2)}
.tool-code.out{background:rgba(0,0,0,.4)}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:.4rem}
.chip{padding:3px 10px;background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);border-radius:50px;font-size:.75rem;color:var(--primary);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(108,99,255,.2)}
.meta-row{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:.5rem}
.select-input{padding:7px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer}
.select-input:focus{border-color:var(--primary)}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div>
    <div class="tool-label">Input HTML</div>
    <textarea class="tool-code" id="htmlIn" placeholder="<div class='container'><h1>Hello</h1><p>World</p></div>"></textarea>
    <div class="chips">
      <span class="chip" onclick="loadEx('simple')">Simple Page</span>
      <span class="chip" onclick="loadEx('form')">Form</span>
      <span class="chip" onclick="loadEx('table')">Table</span>
    </div>
  </div>

  <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
    <div>
      <span style="font-size:.85rem;color:var(--muted);margin-right:.5rem">Indent:</span>
      <select class="select-input" id="indentSize">
        <option value="2" selected>2 spaces</option>
        <option value="4">4 spaces</option>
        <option value="tab">Tab</option>
      </select>
    </div>
  </div>

  <div class="act-row">
    <button class="btn-go" onclick="formatHTML()"><i class="bi bi-code-slash"></i> Format HTML</button>
    <button class="btn-sm" onclick="clearAll()"><i class="bi bi-x-circle"></i> Clear</button>
    <div class="status" id="st"></div>
  </div>

  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
      <div class="tool-label" style="margin-bottom:0">Formatted Output</div>
      <div style="display:flex;gap:6px">
        <button class="btn-sm" id="btnCopy" onclick="copyOut()"><i class="bi bi-clipboard"></i> Copy</button>
        <button class="btn-sm" onclick="downloadOut()"><i class="bi bi-download"></i> Download</button>
      </div>
    </div>
    <textarea class="tool-code out" id="htmlOut" readonly placeholder="Formatted HTML will appear here..."></textarea>
    <div class="meta-row" id="stats"></div>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
(() => {
const VOID_ELEMENTS = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
const INLINE_ELEMENTS = new Set(['a','abbr','acronym','b','bdo','big','br','button','cite','code','dfn','em','i','img','input','kbd','label','map','object','output','q','samp','select','small','span','strong','sub','sup','textarea','time','tt','var']);
const PRE_ELEMENTS = new Set(['pre','script','style','textarea']);

const EXAMPLES = {
  simple: `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Page</title><link rel="stylesheet" href="styles.css"></head><body><header><nav><ul><li><a href="/">Home</a></li><li><a href="/about">About</a></li></ul></nav></header><main><h1>Welcome</h1><p>This is a paragraph with <strong>bold</strong> and <em>italic</em> text.</p></main><footer><p>&copy; 2024</p></footer></body></html>`,
  form: `<form action="/submit" method="POST"><div class="form-group"><label for="name">Name</label><input type="text" id="name" name="name" required placeholder="Enter your name"></div><div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required></div><div class="form-group"><label for="message">Message</label><textarea id="message" name="message" rows="4"></textarea></div><button type="submit">Send</button></form>`,
  table: `<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Status</th></tr></thead><tbody><tr><td>1</td><td>Alice</td><td>alice@example.com</td><td><span class="badge active">Active</span></td></tr><tr><td>2</td><td>Bob</td><td>bob@example.com</td><td><span class="badge inactive">Inactive</span></td></tr></tbody></table>`
};

function loadEx(key) {
  document.getElementById('htmlIn').value = EXAMPLES[key];
  formatHTML();
}

function formatHTML() {
  const raw = document.getElementById('htmlIn').value.trim();
  if (!raw) { showErr('st','No input provided'); return; }
  hideStatus('st');

  try {
    const indentOpt = document.getElementById('indentSize').value;
    const indent = indentOpt === 'tab' ? '\t' : ' '.repeat(parseInt(indentOpt));
    const formatted = formatHTMLString(raw, indent);
    document.getElementById('htmlOut').value = formatted;

    // Count elements
    const elemCount = (formatted.match(/<[a-zA-Z][^>]*>/g) || []).length;
    const lines = formatted.split('\n').length;
    document.getElementById('stats').innerHTML = `
      <span><i class="bi bi-code-slash"></i> ${elemCount} elements</span>
      <span><i class="bi bi-list-ol"></i> ${lines} lines</span>
      <span><i class="bi bi-file-earmark"></i> ${formatted.length} chars</span>
    `;
    showOk('st','HTML formatted');
  } catch(e) {
    showErr('st', 'Error: ' + e.message);
  }
}

function formatHTMLString(html, indent) {
  // Use DOMParser for accurate parsing
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Check if it's a full document or fragment
  const isFullDoc = /<!doctype/i.test(html) || /<html/i.test(html);

  if (isFullDoc) {
    let out = '';
    if (/<!doctype/i.test(html)) out += '<!DOCTYPE html>\n';
    out += serializeNode(doc.documentElement, 0, indent);
    return out;
  } else {
    // Fragment
    const body = doc.body;
    return Array.from(body.childNodes).map(n => serializeNode(n, 0, indent)).join('\n').trim();
  }
}

function serializeNode(node, depth, indent) {
  const pad = indent.repeat(depth);

  if (node.nodeType === Node.TEXT_NODE) {
    const text = node.textContent.trim();
    return text ? pad + text : '';
  }

  if (node.nodeType === Node.COMMENT_NODE) {
    return `${pad}<!-- ${node.textContent.trim()} -->`;
  }

  if (node.nodeType !== Node.ELEMENT_NODE) return '';

  const tag = node.tagName.toLowerCase();
  const attrs = Array.from(node.attributes).map(a => ` ${a.name}="${a.value}"`).join('');
  const openTag = `<${tag}${attrs}>`;

  if (VOID_ELEMENTS.has(tag)) {
    return `${pad}${openTag}`;
  }

  if (PRE_ELEMENTS.has(tag)) {
    return `${pad}${openTag}${node.innerHTML}</${tag}>`;
  }

  const children = Array.from(node.childNodes);
  const hasOnlyText = children.every(c => c.nodeType === Node.TEXT_NODE);
  const textContent = node.textContent.trim();

  if (hasOnlyText && textContent && !textContent.includes('\n')) {
    return `${pad}${openTag}${textContent}</${tag}>`;
  }

  if (children.length === 0) {
    return `${pad}${openTag}</${tag}>`;
  }

  const childLines = children
    .map(c => serializeNode(c, depth + 1, indent))
    .filter(s => s.trim());

  if (childLines.length === 0) return `${pad}${openTag}</${tag}>`;

  return `${pad}${openTag}\n${childLines.join('\n')}\n${pad}</${tag}>`;
}

function copyOut() {
  const v = document.getElementById('htmlOut').value;
  if (!v) return;
  navigator.clipboard.writeText(v).then(() => {
    const btn = document.getElementById('btnCopy');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function downloadOut() {
  const v = document.getElementById('htmlOut').value;
  if (!v) return;
  const blob = new Blob([v], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'formatted.html'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function clearAll() {
  document.getElementById('htmlIn').value = '';
  document.getElementById('htmlOut').value = '';
  document.getElementById('stats').innerHTML = '';
  hideStatus('st');
}

function showErr(id,msg){const el=document.getElementById(id);el.className='status err';el.innerHTML='<i class="bi bi-exclamation-triangle-fill"></i> '+msg;}
function showOk(id,msg){const el=document.getElementById(id);el.className='status ok';el.innerHTML='<i class="bi bi-check-circle-fill"></i> '+msg;}
function hideStatus(id){document.getElementById(id).className='status';}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); formatHTML(); }
});
})();
</script>
{% endblock %}
