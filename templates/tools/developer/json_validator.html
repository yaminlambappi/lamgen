{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .editor-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .json-editor {
        width: 100%;
        height: 400px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'Fira Code', monospace;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        resize: vertical;
        outline: none;
    }
    .status-panel {
        padding: 1rem;
        border-radius: 8px;
        font-weight: 600;
        display: none;
    }
    .status-success {
        background: rgba(76, 175, 80, 0.1);
        color: #4CAF50;
        border: 1px solid #4CAF50;
    }
    .status-error {
        background: rgba(244, 67, 54, 0.1);
        color: #F44336;
        border: 1px solid #F44336;
    }
    .controls {
        display: flex;
        gap: 1rem;
    }
</style>
{% endblock %}

{% block tool_workspace %}
<div class="editor-container">
    <textarea id="json-input" class="json-editor" placeholder="Paste your JSON here..."></textarea>
    
    <div id="status-panel" class="status-panel"></div>
    
    <div class="controls">
        <button id="validate-btn" class="btn-nexus">Validate JSON</button>
        <button id="beautify-btn" class="btn-nexus-secondary">Beautify</button>
        <button id="minify-btn" class="btn-nexus-secondary">Minify</button>
        <button id="clear-btn" class="btn-nexus-secondary">Clear</button>
    </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
    const input = document.getElementById('json-input');
    const statusPanel = document.getElementById('status-panel');
    const validateBtn = document.getElementById('validate-btn');
    const beautifyBtn = document.getElementById('beautify-btn');
    const minifyBtn = document.getElementById('minify-btn');
    const clearBtn = document.getElementById('clear-btn');

    function showStatus(message, isError) {
        statusPanel.textContent = message;
        statusPanel.className = `status-panel ${isError ? 'status-error' : 'status-success'}`;
        statusPanel.style.display = 'block';
    }

    validateBtn.addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) {
            statusPanel.style.display = 'none';
            return;
        }
        try {
            JSON.parse(val);
            showStatus('Valid JSON! Perfect structure.', false);
        } catch (e) {
            showStatus(`Invalid JSON: ${e.message}`, true);
        }
    });

    beautifyBtn.addEventListener('click', () => {
        try {
            const obj = JSON.parse(input.value);
            input.value = JSON.stringify(obj, null, 4);
            showStatus('JSON Beautified!', false);
        } catch (e) {
            showStatus('Cannot beautify invalid JSON.', true);
        }
    });

    minifyBtn.addEventListener('click', () => {
        try {
            const obj = JSON.parse(input.value);
            input.value = JSON.stringify(obj);
            showStatus('JSON Minified!', false);
        } catch (e) {
            showStatus('Cannot minify invalid JSON.', true);
        }
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
        statusPanel.style.display = 'none';
    });
</script>
{% endblock %}
