{% extends "tools/tool_base.html" %}
{% block tool_content %}
<div class="dev-tool-wrap">
  <label class="tool-label">Domain</label>
  <input id="domain" class="tool-input" type="text" placeholder="example.com">
  <div class="grid-2">
    <label><input type="checkbox" id="forceHttps" checked> Force HTTPS</label>
    <label><input type="checkbox" id="wwwRedirect"> Redirect www to non-www</label>
    <label><input type="checkbox" id="gzip" checked> Enable Gzip Compression</label>
    <label><input type="checkbox" id="cache" checked> Browser Caching Rules</label>
  </div>
  <div class="act-row">
    <button class="btn-go" onclick="generateHtaccess()"><i class="bi bi-server"></i> Generate</button>
    <button class="btn-sm" onclick="resetTool()"><i class="bi bi-x-circle"></i> Reset</button>
    <span class="status" id="st"></span>
  </div>
  <textarea id="out" class="tool-code out" readonly placeholder="Generated .htaccess rules"></textarea>
  <div class="act-row">
    <button class="btn-sm" onclick="copyOut()"><i class="bi bi-clipboard"></i> Copy</button>
    <button class="btn-sm" onclick="downloadOut()"><i class="bi bi-download"></i> Download</button>
  </div>
</div>
{% endblock %}
{% block tool_js %}
<script>
function s(t,m){const e=document.getElementById("st");e.className="status "+t;e.innerHTML=(t==="err"?'<i class="bi bi-exclamation-triangle-fill"></i> ':'<i class="bi bi-check-circle-fill"></i> ')+m;}
function generateHtaccess(){
  const d=document.getElementById("domain").value.trim().replace(/^https?:\/\//,"").replace(/\/.*$/,"");
  if(!d){s("err","Domain is required");return;}
  const lines=["# Generated by LamGen","RewriteEngine On"];
  if(document.getElementById("forceHttps").checked){
    lines.push("RewriteCond %{HTTPS} !=on","RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]");
  }
  if(document.getElementById("wwwRedirect").checked){
    lines.push("RewriteCond %{HTTP_HOST} ^www\\."+d.replace(/\./g,"\\.")+"$ [NC]","RewriteRule ^(.*)$ https://"+d+"/$1 [L,R=301]");
  }
  if(document.getElementById("gzip").checked){
    lines.push("","<IfModule mod_deflate.c>","AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json","</IfModule>");
  }
  if(document.getElementById("cache").checked){
    lines.push("","<IfModule mod_expires.c>","ExpiresActive On","ExpiresByType text/css \"access plus 1 month\"","ExpiresByType application/javascript \"access plus 1 month\"","ExpiresByType image/png \"access plus 6 months\"","ExpiresByType image/jpeg \"access plus 6 months\"","</IfModule>");
  }
  document.getElementById("out").value=lines.join("\n");
  s("ok",".htaccess generated");
}
function copyOut(){const v=document.getElementById("out").value;if(v)navigator.clipboard.writeText(v);}
function downloadOut(){const v=document.getElementById("out").value;if(!v)return;const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([v],{type:"text/plain"}));a.download=".htaccess";a.click();}
function resetTool(){["domain","out"].forEach(i=>document.getElementById(i).value="");["forceHttps","gzip","cache"].forEach(i=>document.getElementById(i).checked=true);document.getElementById("wwwRedirect").checked=false;document.getElementById("st").className="status";}
</script>
{% endblock %}
