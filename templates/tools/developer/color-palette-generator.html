{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.color-input-row{display:flex;align-items:center;gap:12px}
.color-picker-wrap{width:56px;height:56px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.15);cursor:pointer;flex-shrink:0}
.color-picker-wrap input[type=color]{width:100%;height:100%;border:none;cursor:pointer;padding:0}
.hex-input{flex:1;max-width:160px;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.9rem;outline:none;text-transform:uppercase}
.hex-input:focus{border-color:var(--primary)}
.palette-section{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.palette-head{padding:10px 16px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.palette-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.swatches{display:flex;flex-wrap:wrap;gap:0}
.swatch{flex:1;min-width:80px;padding:16px 10px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .2s;position:relative}
.swatch:hover{transform:translateY(-3px);z-index:1}
.swatch-color{width:100%;height:60px;border-radius:8px;margin-bottom:4px;transition:all .2s}
.swatch-hex{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text);font-weight:600}
.swatch-rgb{font-size:.65rem;color:var(--muted)}
.swatch-copy{position:absolute;top:8px;right:8px;padding:2px 6px;background:rgba(0,0,0,.5);border-radius:4px;font-size:.65rem;color:rgba(255,255,255,.6);opacity:0;transition:opacity .15s}
.swatch:hover .swatch-copy{opacity:1}
.palettes-grid{display:flex;flex-direction:column;gap:.75rem}
.export-area{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);line-height:1.7;white-space:pre-wrap;word-break:break-all}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">

  <div>
    <div class="tool-label">Base Color</div>
    <div class="color-input-row">
      <div class="color-picker-wrap">
        <input type="color" id="colorPicker" value="#6C63FF" oninput="syncFromPicker()">
      </div>
      <input type="text" class="hex-input" id="hexInput" value="#6C63FF" placeholder="#6C63FF" oninput="syncFromHex()">
      <button class="btn-go" onclick="generate()"><i class="bi bi-palette"></i> Generate</button>
      <button class="btn-sm" onclick="randomColor()"><i class="bi bi-shuffle"></i> Random</button>
      <button class="btn-sm" onclick="resetPalette()"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
      <div class="status" id="st"></div>
    </div>
  </div>

  <div id="palettesOut" style="display:none">
    <div class="palettes-grid" id="palettesGrid"></div>

    <div style="margin-top:.75rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">
        <div class="tool-label" style="margin-bottom:0">CSS Variables Export</div>
        <button class="btn-sm" id="btnExport" onclick="copyExport()"><i class="bi bi-clipboard"></i> Copy</button>
      </div>
      <div class="export-area" id="exportArea"></div>
    </div>
  </div>

</div>
{% endblock %}

{% block tool_js %}
<script>
// Color math utilities
function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s));
  l = Math.max(0, Math.min(100, l));
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => {
    const k = (n + h/30) % 12;
    const color = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
    return Math.round(255*color).toString(16).padStart(2,'0');
  };
  return '#' + f(0) + f(8) + f(4);
}

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function hslToRgb(h, s, l) {
  return hexToRgb(hslToHex(h, s, l));
}

function generatePalettes(hex) {
  const [h, s, l] = hexToHsl(hex);
  return {
    complementary: {
      name: 'Complementary',
      colors: [hex, hslToHex(h+180, s, l)]
    },
    analogous: {
      name: 'Analogous',
      colors: [hslToHex(h-30, s, l), hex, hslToHex(h+30, s, l)]
    },
    triadic: {
      name: 'Triadic',
      colors: [hex, hslToHex(h+120, s, l), hslToHex(h+240, s, l)]
    },
    tetradic: {
      name: 'Tetradic',
      colors: [hex, hslToHex(h+90, s, l), hslToHex(h+180, s, l), hslToHex(h+270, s, l)]
    },
    splitComplementary: {
      name: 'Split-Complementary',
      colors: [hex, hslToHex(h+150, s, l), hslToHex(h+210, s, l)]
    },
    monochromatic: {
      name: 'Monochromatic',
      colors: [
        hslToHex(h, s, Math.max(10, l-40)),
        hslToHex(h, s, Math.max(10, l-20)),
        hex,
        hslToHex(h, s, Math.min(90, l+20)),
        hslToHex(h, s, Math.min(90, l+40))
      ]
    }
  };
}

function makeSwatch(hex, name) {
  const [r,g,b] = hexToRgb(hex);
  const [h,s,l] = hexToHsl(hex);
  const textColor = l > 55 ? '#000' : '#fff';
  return `
    <div class="swatch" onclick="copyHex('${hex}',this)" title="Click to copy ${hex}">
      <div class="swatch-color" style="background:${hex}"></div>
      <span class="swatch-hex" style="color:${textColor === '#000' ? 'var(--text)' : 'var(--text)'}">${hex.toUpperCase()}</span>
      <span class="swatch-rgb">rgb(${r},${g},${b})</span>
      <span class="swatch-rgb">hsl(${h},${s}%,${l}%)</span>
      <span class="swatch-copy"><i class="bi bi-clipboard"></i></span>
    </div>
  `;
}

function copyHex(hex, el) {
  navigator.clipboard.writeText(hex).then(() => {
    const orig = el.querySelector('.swatch-copy').innerHTML;
    el.querySelector('.swatch-copy').innerHTML = '<i class="bi bi-check2"></i>';
    el.querySelector('.swatch-copy').style.opacity = '1';
    setTimeout(() => {
      el.querySelector('.swatch-copy').innerHTML = orig;
      el.querySelector('.swatch-copy').style.opacity = '';
    }, 1500);
  });
}

function generate() {
  const hex = document.getElementById('hexInput').value.trim();
  if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) { showErr('st','Enter a valid hex color (e.g. #6C63FF)'); return; }
  hideStatus('st');

  const palettes = generatePalettes(hex);
  const grid = document.getElementById('palettesGrid');
  grid.innerHTML = Object.values(palettes).map(p => `
    <div class="palette-section">
      <div class="palette-head">
        <span class="palette-title">${p.name}</span>
        <button class="btn-sm" style="padding:4px 10px;font-size:.72rem" onclick="copyPalette(${JSON.stringify(p.colors)},this)">
          <i class="bi bi-clipboard"></i> Copy All
        </button>
      </div>
      <div class="swatches">${p.colors.map(c => makeSwatch(c)).join('')}</div>
    </div>
  `).join('');

  // CSS Variables export
  const allColors = {};
  Object.entries(palettes).forEach(([key, p]) => {
    p.colors.forEach((c, i) => {
      const varName = `--color-${key.replace(/([A-Z])/g,'-$1').toLowerCase()}-${i+1}`;
      allColors[varName] = c;
    });
  });
  const cssVars = ':root {\n' + Object.entries(allColors).map(([k,v]) => `  ${k}: ${v};`).join('\n') + '\n}';
  document.getElementById('exportArea').textContent = cssVars;
  document.getElementById('palettesOut').style.display = '';
  showOk('st', 'Palettes generated');
}

function copyPalette(colors, btn) {
  navigator.clipboard.writeText(colors.join(', ')).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function copyExport() {
  const text = document.getElementById('exportArea').textContent;
  const btn = document.getElementById('btnExport');
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

function randomColor() {
  const h = Math.floor(Math.random()*360);
  const s = 50 + Math.floor(Math.random()*40);
  const l = 40 + Math.floor(Math.random()*25);
  const hex = hslToHex(h, s, l);
  document.getElementById('hexInput').value = hex.toUpperCase();
  document.getElementById('colorPicker').value = hex;
  generate();
}

function syncFromPicker() {
  const hex = document.getElementById('colorPicker').value;
  document.getElementById('hexInput').value = hex.toUpperCase();
  generate();
}

function syncFromHex() {
  const hex = document.getElementById('hexInput').value.trim();
  if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
    document.getElementById('colorPicker').value = hex;
  }
}

function resetPalette() {
  document.getElementById('hexInput').value = '#6C63FF';
  document.getElementById('colorPicker').value = '#6c63ff';
  generate();
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status err';
  el.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> ' + msg;
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status ok';
  el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + msg;
}
function hideStatus(id) { document.getElementById(id).className = 'status'; }

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); generate(); }
});

generate();
</script>
{% endblock %}
