{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .editor-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }
    .xml-editor {
        width: 100%;
        height: 400px;
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'Fira Code', monospace;
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border);
        resize: vertical;
        outline: none;
    }
    .controls {
        display: flex;
        gap: 1rem;
    }
</style>
{% endblock %}

{% block tool_content %}
<div class="editor-container">
    <textarea id="xml-input" class="xml-editor" placeholder="Paste your XML here..."></textarea>
    
    <div class="controls">
        <button id="format-btn" class="btn-nexus">Format XML</button>
        <button id="minify-btn" class="btn-nexus-secondary">Minify</button>
        <button id="clear-btn" class="btn-nexus-secondary">Clear</button>
    </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
    const input = document.getElementById('xml-input');
    const formatBtn = document.getElementById('format-btn');
    const minifyBtn = document.getElementById('minify-btn');
    const clearBtn = document.getElementById('clear-btn');

    function formatXml(xml) {
        let formatted = '';
        let reg = /(>)(<)(\/*)/g;
        xml = xml.replace(reg, '$1\r\n$2$3');
        let pad = 0;
        xml.split('\r\n').forEach(function(node) {
            let indent = 0;
            if (node.match( /.+<\/\w[^>]*>$/ )) {
                indent = 0;
            } else if (node.match( /^<\/\w/ )) {
                if (pad != 0) {
                    pad -= 1;
                }
            } else if (node.match( /^<\w[^>]*[^\/]>.*$/ )) {
                indent = 1;
            } else {
                indent = 0;
            }

            let padding = '';
            for (let i = 0; i < pad; i++) {
                padding += '    ';
            }

            formatted += padding + node + '\r\n';
            pad += indent;
        });

        return formatted.trim();
    }

    formatBtn.addEventListener('click', () => {
        const val = input.value.trim();
        if (val) {
            input.value = formatXml(val);
        }
    });

    minifyBtn.addEventListener('click', () => {
        input.value = input.value.replace(/>\s+</g, '><').trim();
    });

    clearBtn.addEventListener('click', () => {
        input.value = '';
    });
</script>
{% endblock %}
