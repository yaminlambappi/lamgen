{% extends "tools/tool_base.html" %}

{% block tool_content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1.5rem;text-align:center;gap:1.25rem;">
    <div style="width:64px;height:64px;background:{{ category.color_from }}18;border:1px solid {{ category.color_from }}38;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 8px 24px {{ category.color_from }}18;">
        <i class="{{ tool.icon }}" style="color:{{ category.color_from }};"></i>
    </div>
    <div>
        <h2 style="font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:700;margin-bottom:.5rem;color:var(--lg-text);">{{ tool.name }}</h2>
        <p style="color:var(--lg-text-muted);max-width:440px;line-height:1.6;font-size:.88rem;">{{ tool.description|default:tool.short_desc }}</p>
    </div>
    <div style="background:rgba(62,236,216,0.06);border:1px solid rgba(62,236,216,0.18);border-radius:12px;padding:.85rem 1.25rem;font-size:.82rem;color:var(--lg-text-muted);max-width:380px;display:flex;align-items:center;gap:8px;">
        <i class="bi bi-clock-history" style="color:var(--lg-cyan);flex-shrink:0;"></i>
        Full interactive interface coming soon. Check back shortly.
    </div>
</div>
{% endblock %}
