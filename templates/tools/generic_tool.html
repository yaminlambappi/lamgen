{% extends "tools/tool_base.html" %}

{% block tool_content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;gap:1.5rem;">
  <div style="width:72px;height:72px;background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;">
    <i class="{{ tool.icon }}" style="color:var(--primary);"></i>
  </div>
  <div>
    <h2 style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem;">{{ tool.name }}</h2>
    <p style="color:var(--muted);max-width:480px;line-height:1.6;font-size:.95rem;">{{ tool.description }}</p>
  </div>
  <div style="background:rgba(0,245,212,0.05);border:1px solid rgba(0,245,212,0.15);border-radius:12px;padding:1rem 1.5rem;font-size:.85rem;color:var(--muted);max-width:400px;">
    <i class="bi bi-clock-history" style="color:var(--accent);margin-right:6px;"></i>
    Dedicated interface coming soon. Check back for the full tool experience.
  </div>
</div>
{% endblock %}
