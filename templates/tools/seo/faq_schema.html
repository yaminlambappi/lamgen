{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .faq-container { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .faq-item { background: #0A0A0F; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; position: relative; }
    .btn-remove { position: absolute; top: 1rem; right: 1rem; background: rgba(255,107,107,0.1); color: var(--danger); border: none; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; }
    
    .input-grp { margin-bottom: 1rem; }
    .input-grp label { display: block; margin-bottom: 0.5rem; color: var(--muted); font-size: 0.9rem; }
    .input-field { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 0.8rem; border-radius: 8px; outline: none; }
    .input-field:focus { border-color: var(--primary); }
    textarea.input-field { resize: vertical; min-height: 80px; }
    
    .btn-action { display: inline-block; padding: 0.8rem 1.5rem; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .btn-action:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
    
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; font-weight: bold; border: none; }
    .btn-primary:hover { transform: translateY(-2px); }

    .output-area { background: #0F0F1A; border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; position: relative; }
    .output-code { font-family: monospace; color: #00F5D4; white-space: pre-wrap; word-break: break-all; }
    .btn-copy { position: absolute; top: 1rem; right: 1rem; }
</style>
{% endblock %}

{% block tool_content %}
<div class="faq-container" id="faq-list">
    <!-- Items rendered here by JS -->
</div>

<div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
    <button id="btn-add" class="btn-action"><i class="bi bi-plus-lg"></i> Add Question</button>
    <button id="btn-generate" class="btn-action btn-primary"><i class="bi bi-magic"></i> Generate Schema</button>
</div>

<div class="output-area" id="output-area" style="display: none;">
    <button class="btn-action btn-copy" id="btn-copy"><i class="bi bi-clipboard"></i> Copy JSON-LD</button>
    <div style="color: var(--muted); margin-bottom: 1rem; font-size: 0.9rem;">Paste this inside the <code>&lt;head&gt;</code> or <code>&lt;body&gt;</code> of your HTML page.</div>
    <div class="output-code" id="output-code"></div>
</div>
{% endblock %}

{% block tool_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const faqList = document.getElementById('faq-list');
        let faqs = [{ q: '', a: '' }];

        function render() {
            faqList.innerHTML = faqs.map((faq, index) => `
                <div class="faq-item">
                    ${faqs.length > 1 ? `<button class="btn-remove" onclick="removeFaq(${index})"><i class="bi bi-trash"></i></button>` : ''}
                    <div class="input-grp" style="margin-right: 3rem;">
                        <label>Question ${index + 1}</label>
                        <input type="text" class="input-field faq-q" value="${faq.q}" data-index="${index}" placeholder="e.g. What is LamGen?">
                    </div>
                    <div class="input-grp" style="margin-bottom: 0;">
                        <label>Answer ${index + 1}</label>
                        <textarea class="input-field faq-a" data-index="${index}" placeholder="e.g. LamGen is a massive free online utility ecosystem...">${faq.a}</textarea>
                    </div>
                </div>
            `).join('');

            // Attach listeners to update state
            document.querySelectorAll('.faq-q').forEach(el => {
                el.addEventListener('input', (e) => { faqs[e.target.dataset.index].q = e.target.value; });
            });
            document.querySelectorAll('.faq-a').forEach(el => {
                el.addEventListener('input', (e) => { faqs[e.target.dataset.index].a = e.target.value; });
            });
        }

        window.removeFaq = (index) => {
            faqs.splice(index, 1);
            render();
        };

        document.getElementById('btn-add').addEventListener('click', () => {
            faqs.push({ q: '', a: '' });
            render();
        });

        document.getElementById('btn-generate').addEventListener('click', () => {
            const validFaqs = faqs.filter(f => f.q.trim() && f.a.trim());
            
            if (validFaqs.length === 0) {
                alert("Please add at least one complete Question and Answer.");
                return;
            }

            const schema = {
                "@context": "https://schema.org",
                "@type": "FAQPage",
                "mainEntity": validFaqs.map(f => ({
                    "@type": "Question",
                    "name": f.q.trim(),
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": f.a.trim().replace(/\n/g, '<br>')
                    }
                }))
            };

            const finalHtml = `<script type="application/ld+json">\n${JSON.stringify(schema, null, 2)}\n<\/script>`;
            
            document.getElementById('output-code').textContent = finalHtml;
            document.getElementById('output-area').style.display = 'block';
            document.getElementById('output-area').scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('btn-copy').addEventListener('click', () => {
            const code = document.getElementById('output-code').textContent;
            navigator.clipboard.writeText(code);
            const btn = document.getElementById('btn-copy');
            btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
            setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy JSON-LD', 2000);
        });

        // Initial render
        render();
    });
</script>
{% endblock %}
