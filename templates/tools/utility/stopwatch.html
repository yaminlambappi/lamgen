{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.sw-display{text-align:center;padding:32px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:16px}
.sw-time{font-size:4rem;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent);letter-spacing:2px}
.sw-ms{font-size:2rem;color:var(--muted)}
.kb-hints{display:flex;gap:12px;flex-wrap:wrap;font-size:.75rem;color:var(--muted)}
.kb-hint-item{display:flex;align-items:center;gap:4px}
.kb-key{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:.72rem}
.lap-table{width:100%;border-collapse:collapse;font-size:.85rem}
.lap-table th{text-align:left;padding:8px 12px;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid rgba(255,255,255,.06)}
.lap-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.lap-table tr:last-child td{border-bottom:none}
.lap-table .lap-num{color:var(--muted)}
.lap-table .lap-split{font-family:'JetBrains Mono',monospace;color:var(--text)}
.lap-table .lap-total{font-family:'JetBrains Mono',monospace;color:var(--accent)}
.lap-table .best{color:#00F5D4}
.lap-table .worst{color:#FF6B6B}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div class="sw-display">
    <div class="sw-time" id="sw-display">00:00<span class="sw-ms">.000</span></div>
  </div>

  <div class="act-row" style="justify-content:center">
    <button class="btn-go" id="btn-start" onclick="toggleSW()"><i class="bi bi-play-fill"></i> Start</button>
    <button class="btn-sm" onclick="lapSW()" id="btn-lap" disabled><i class="bi bi-flag"></i> Lap (L)</button>
    <button class="btn-sm" onclick="resetSW()"><i class="bi bi-arrow-counterclockwise"></i> Reset (R)</button>
    <button class="btn-sm" onclick="exportLaps()" id="btn-export" style="display:none"><i class="bi bi-download"></i> Export CSV</button>
  </div>

  <div class="kb-hints">
    <div class="kb-hint-item"><span class="kb-key">Space</span> Start/Stop</div>
    <div class="kb-hint-item"><span class="kb-key">L</span> Lap</div>
    <div class="kb-hint-item"><span class="kb-key">R</span> Reset</div>
  </div>

  <div id="laps-section" style="display:none">
    <div class="tool-label">Lap Times</div>
    <div style="overflow-x:auto">
      <table class="lap-table">
        <thead><tr><th>#</th><th>Split</th><th>Total</th></tr></thead>
        <tbody id="lap-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function downloadText(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

let running = false;
let startTime = 0;
let elapsed = 0;
let rafId = null;
let laps = [];
let lastLapTime = 0;

function fmtTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  const msec = ms % 1000;
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}<span class="sw-ms">.${String(msec).padStart(3,'0')}</span>`;
}

function fmtTimeCSV(ms) {
  const totalSec = Math.floor(ms / 1000);
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  const msec = ms % 1000;
  return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(msec).padStart(3,'0')}`;
}

function tick() {
  elapsed = performance.now() - startTime;
  document.getElementById('sw-display').innerHTML = fmtTime(elapsed);
  rafId = requestAnimationFrame(tick);
}

function toggleSW() {
  if (running) {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = performance.now() - startTime;
    document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Resume';
    document.getElementById('btn-start').style.background = 'linear-gradient(135deg,#00F5D4,#00B4D8)';
  } else {
    running = true;
    startTime = performance.now() - elapsed;
    rafId = requestAnimationFrame(tick);
    document.getElementById('btn-start').innerHTML = '<i class="bi bi-pause-fill"></i> Stop';
    document.getElementById('btn-start').style.background = '';
    document.getElementById('btn-lap').disabled = false;
  }
}

function lapSW() {
  if (!running) return;
  const split = elapsed - lastLapTime;
  lastLapTime = elapsed;
  laps.push({split, total: elapsed});
  renderLaps();
  document.getElementById('laps-section').style.display = 'block';
  document.getElementById('btn-export').style.display = 'inline-flex';
}

function resetSW() {
  running = false;
  cancelAnimationFrame(rafId);
  elapsed = 0;
  lastLapTime = 0;
  laps = [];
  document.getElementById('sw-display').innerHTML = fmtTime(0);
  document.getElementById('btn-start').innerHTML = '<i class="bi bi-play-fill"></i> Start';
  document.getElementById('btn-start').style.background = '';
  document.getElementById('btn-lap').disabled = true;
  document.getElementById('laps-section').style.display = 'none';
  document.getElementById('btn-export').style.display = 'none';
}

function renderLaps() {
  const tbody = document.getElementById('lap-tbody');
  if (!laps.length) { tbody.innerHTML = ''; return; }
  const splits = laps.map(l => l.split);
  const minSplit = Math.min(...splits);
  const maxSplit = Math.max(...splits);
  tbody.innerHTML = [...laps].reverse().map((l, ri) => {
    const i = laps.length - 1 - ri;
    const isBest = l.split === minSplit && laps.length > 1;
    const isWorst = l.split === maxSplit && laps.length > 1;
    return `<tr>
      <td class="lap-num">${i+1}</td>
      <td class="lap-split ${isBest?'best':isWorst?'worst':''}">${fmtTimeCSV(l.split)}${isBest?' 🏆':isWorst?' 🐢':''}</td>
      <td class="lap-total">${fmtTimeCSV(l.total)}</td>
    </tr>`;
  }).join('');
}

function exportLaps() {
  if (!laps.length) return;
  const csv = 'Lap,Split,Total\n' + laps.map((l,i) => `${i+1},${fmtTimeCSV(l.split)},${fmtTimeCSV(l.total)}`).join('\n');
  downloadText(csv, 'laps.csv', 'text/csv');
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); toggleSW(); }
  else if (e.key.toLowerCase() === 'l') lapSW();
  else if (e.key.toLowerCase() === 'r') resetSW();
});
</script>
{% endblock %}
