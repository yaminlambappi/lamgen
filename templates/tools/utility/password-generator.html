{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.tool-code{width:100%;min-height:180px;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s;box-sizing:border-box}
.tool-code:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.tool-code.mono{font-family:'JetBrains Mono',monospace;font-size:.82rem}
.tool-code.out{background:rgba(0,0,0,.4);cursor:default}
.tool-code::placeholder{color:rgba(255,255,255,.2)}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:.25rem}
.chip{padding:3px 10px;background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);border-radius:50px;font-size:.75rem;color:var(--primary);cursor:pointer;transition:all .15s}
.chip:hover{background:rgba(108,99,255,.2)}
.result-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;text-align:center}
.result-big{font-size:2.5rem;font-weight:800;font-family:'Syne',sans-serif;color:var(--accent);margin-bottom:.25rem}
.result-label{font-size:.8rem;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
.input-group{display:flex;flex-direction:column;gap:.3rem}
.input-label{font-size:.75rem;color:var(--muted);font-weight:600}
.num-input,.select-input,.text-input{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;box-sizing:border-box;transition:border-color .2s}
.num-input:focus,.select-input:focus,.text-input:focus{border-color:var(--primary)}
.num-input option,.select-input option{background:#0F0F1A}
.meta-row{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted)}
.meta-item{display:flex;align-items:center;gap:5px}
/* tool-specific */
.pwd-out-row{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:1rem;word-break:break-all;color:var(--accent)}
.pwd-out-row span{flex:1}
.strength-bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.strength-bar{height:100%;border-radius:3px;transition:width .3s,background .3s}
.strength-label{font-size:.75rem;font-weight:700;margin-top:4px}
.check-row{display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;user-select:none}
.check-row input{accent-color:var(--primary);width:16px;height:16px}
.slider-row{display:flex;align-items:center;gap:12px}
.slider-row input[type=range]{flex:1;accent-color:var(--primary)}
.bulk-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.82rem;word-break:break-all}
.bulk-item span{flex:1}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div>
    <div class="tool-label">Generated Password</div>
    <div class="pwd-out-row">
      <span id="pwd-display">Click Generate</span>
      <button class="btn-sm" onclick="copyPwd(this)"><i class="bi bi-clipboard"></i> Copy</button>
    </div>
    <div style="margin-top:8px">
      <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar" style="width:0%;background:#FF6B6B"></div></div>
      <div class="strength-label" id="strength-label" style="color:var(--muted)">—</div>
    </div>
  </div>

  <div class="grid-2">
    <div>
      <div class="tool-label">Length: <span id="len-display">16</span></div>
      <div class="slider-row">
        <span style="font-size:.75rem;color:var(--muted)">8</span>
        <input type="range" id="len-slider" min="8" max="128" value="16" oninput="document.getElementById('len-display').textContent=this.value;generatePwd()">
        <span style="font-size:.75rem;color:var(--muted)">128</span>
      </div>
    </div>
    <div>
      <div class="tool-label">Bulk Count</div>
      <input type="number" class="num-input" id="bulk-count" min="1" max="20" value="5" placeholder="1-20">
    </div>
  </div>

  <div class="grid-2">
    <div style="display:flex;flex-direction:column;gap:8px">
      <label class="check-row"><input type="checkbox" id="chk-upper" checked onchange="generatePwd()"> Uppercase (A-Z)</label>
      <label class="check-row"><input type="checkbox" id="chk-lower" checked onchange="generatePwd()"> Lowercase (a-z)</label>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <label class="check-row"><input type="checkbox" id="chk-nums" checked onchange="generatePwd()"> Numbers (0-9)</label>
      <label class="check-row"><input type="checkbox" id="chk-syms" checked onchange="generatePwd()"> Symbols (!@#$%^&*)</label>
    </div>
  </div>

  <div class="act-row">
    <button class="btn-go" onclick="generatePwd()"><i class="bi bi-arrow-clockwise"></i> Generate</button>
    <button class="btn-sm" onclick="generateBulk()"><i class="bi bi-stack"></i> Bulk Generate</button>
    <button class="btn-sm" id="dl-btn" style="display:none" onclick="downloadBulk()"><i class="bi bi-download"></i> Download All</button>
    <div class="status" id="status"></div>
  </div>

  <div id="bulk-list" style="display:flex;flex-direction:column;gap:6px"></div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}
function downloadText(content, filename, mime='text/plain') {
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status err';
  el.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> ' + msg;
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status ok';
  el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + msg;
}
function hideStatus(id) { document.getElementById(id).className = 'status'; }

let lastBulk = [];

function buildCharset() {
  let pool = '';
  if (document.getElementById('chk-upper').checked) pool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (document.getElementById('chk-lower').checked) pool += 'abcdefghijklmnopqrstuvwxyz';
  if (document.getElementById('chk-nums').checked) pool += '0123456789';
  if (document.getElementById('chk-syms').checked) pool += '!@#$%^&*()_+-=[]{}|;:,.<>?';
  return pool;
}

function genOne(len, pool) {
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(v => pool[v % pool.length]).join('');
}

function calcStrength(pwd) {
  let score = 0;
  let charsetSize = 0;
  if (/[A-Z]/.test(pwd)) { score++; charsetSize += 26; }
  if (/[a-z]/.test(pwd)) { score++; charsetSize += 26; }
  if (/[0-9]/.test(pwd)) { score++; charsetSize += 10; }
  if (/[^A-Za-z0-9]/.test(pwd)) { score++; charsetSize += 32; }
  if (pwd.length >= 12) score++;
  if (pwd.length >= 20) score++;
  const entropy = Math.log2(Math.pow(charsetSize || 1, pwd.length));
  return { score, entropy };
}

function generatePwd() {
  const pool = buildCharset();
  if (!pool) { showErr('status', 'Select at least one character type'); return; }
  hideStatus('status');
  const len = parseInt(document.getElementById('len-slider').value);
  const pwd = genOne(len, pool);
  document.getElementById('pwd-display').textContent = pwd;
  const { score, entropy } = calcStrength(pwd);
  const bar = document.getElementById('strength-bar');
  const lbl = document.getElementById('strength-label');
  const pct = Math.min(100, (entropy / 128) * 100);
  bar.style.width = pct + '%';
  if (score <= 2) { bar.style.background = '#FF6B6B'; lbl.textContent = 'Weak — ' + Math.round(entropy) + ' bits'; lbl.style.color = '#FF6B6B'; }
  else if (score <= 3) { bar.style.background = '#FFC107'; lbl.textContent = 'Fair — ' + Math.round(entropy) + ' bits'; lbl.style.color = '#FFC107'; }
  else if (score <= 4) { bar.style.background = '#00F5D4'; lbl.textContent = 'Strong — ' + Math.round(entropy) + ' bits'; lbl.style.color = 'var(--accent)'; }
  else { bar.style.background = '#6C63FF'; lbl.textContent = 'Very Strong — ' + Math.round(entropy) + ' bits'; lbl.style.color = 'var(--primary)'; }
}

function copyPwd(btn) {
  const pwd = document.getElementById('pwd-display').textContent;
  if (pwd === 'Click Generate') return;
  copyText(pwd, btn);
}

function generateBulk() {
  const pool = buildCharset();
  if (!pool) { showErr('status', 'Select at least one character type'); return; }
  hideStatus('status');
  const len = parseInt(document.getElementById('len-slider').value);
  const count = Math.min(20, Math.max(1, parseInt(document.getElementById('bulk-count').value) || 5));
  lastBulk = [];
  const container = document.getElementById('bulk-list');
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const pwd = genOne(len, pool);
    lastBulk.push(pwd);
    const div = document.createElement('div');
    div.className = 'bulk-item';
    div.innerHTML = `<span>${pwd}</span><button class="btn-sm" onclick="copyText('${pwd.replace(/'/g,"\\'")}',this)"><i class="bi bi-clipboard"></i></button>`;
    container.appendChild(div);
  }
  document.getElementById('dl-btn').style.display = 'inline-flex';
  showOk('status', count + ' passwords generated');
}

function downloadBulk() {
  if (!lastBulk.length) return;
  downloadText(lastBulk.join('\n'), 'passwords.txt');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generatePwd();
});

generatePwd();
</script>
{% endblock %}
