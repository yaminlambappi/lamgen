{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .pwd-display { background: #0A0A0F; border: 2px solid var(--border); border-radius: 12px; padding: 2rem; text-align: center; font-family: 'Fira Code', monospace; font-size: 2.5rem; color: var(--primary); word-break: break-all; margin-bottom: 2rem; position: relative; letter-spacing: 2px; }
    .pwd-display.strong { border-color: #00F5D4; color: #00F5D4; }
    .pwd-display.medium { border-color: #FFC107; color: #FFC107; }
    .pwd-display.weak { border-color: #FF6B6B; color: #FF6B6B; }
    
    .btn-copy { position: absolute; right: 1rem; top: 1rem; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-family: 'DM Sans'; font-size: 0.9rem; }
    .btn-copy:hover { background: rgba(255,255,255,0.1); }
    
    .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; background: rgba(255,255,255,0.02); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); }
    
    .control-grp { display: flex; flex-direction: column; gap: 1rem; }
    .control-grp label { display: flex; align-items: center; gap: 0.8rem; font-size: 1.1rem; color: var(--text); cursor: pointer; }
    .control-grp input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }
    
    .slider-grp { grid-column: 1 / -1; margin-bottom: 1rem; }
    .slider-header { display: flex; justify-content: space-between; font-size: 1.1rem; margin-bottom: 1rem; }
    .slider { width: 100%; height: 8px; border-radius: 4px; outline: none; accent-color: var(--primary); }
    
    .btn-generate { grid-column: 1 / -1; padding: 1.2rem; font-size: 1.2rem; font-weight: bold; border-radius: 12px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; border: none; cursor: pointer; box-shadow: 0 0 20px rgba(108,99,255,0.3); transition: transform 0.2s; }
    .btn-generate:hover { transform: scale(1.02); }
</style>
{% endblock %}

{% block tool_content %}
<div class="pwd-display strong" id="pwd-out">Select options below</div>

<div class="controls-grid">
    <div class="slider-grp">
        <div class="slider-header">
            <span>Password Length</span>
            <span id="len-val" style="color: var(--primary); font-weight: bold;">16</span>
        </div>
        <input type="range" id="len-slider" class="slider" min="6" max="64" value="16">
    </div>
    
    <div class="control-grp">
        <label><input type="checkbox" id="chk-upper" checked> Uppercase (A-Z)</label>
        <label><input type="checkbox" id="chk-lower" checked> Lowercase (a-z)</label>
    </div>
    <div class="control-grp">
        <label><input type="checkbox" id="chk-nums" checked> Numbers (0-9)</label>
        <label><input type="checkbox" id="chk-syms" checked> Symbols (!@#$%^&*)</label>
    </div>
    
    <button class="btn-generate" id="btn-gen">Generate Secure Password</button>
</div>
<button class="btn-copy" id="btn-copy"><i class="bi bi-clipboard"></i> Copy</button>
{% endblock %}

{% block tool_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const slider = document.getElementById('len-slider');
        const lenVal = document.getElementById('len-val');
        const out = document.getElementById('pwd-out');
        
        const chkUpper = document.getElementById('chk-upper');
        const chkLower = document.getElementById('chk-lower');
        const chkNums = document.getElementById('chk-nums');
        const chkSyms = document.getElementById('chk-syms');

        const chars = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            nums: '0123456789',
            syms: '!@#$%^&*()_+~|}{[]:;?><,./-='
        };

        slider.addEventListener('input', () => lenVal.textContent = slider.value);

        function generate() {
            let pool = '';
            if(chkUpper.checked) pool += chars.upper;
            if(chkLower.checked) pool += chars.lower;
            if(chkNums.checked) pool += chars.nums;
            if(chkSyms.checked) pool += chars.syms;

            if(!pool) {
                out.textContent = "Select at least one option!";
                out.className = 'pwd-display weak';
                return;
            }

            const len = parseInt(slider.value);
            let pwd = '';
            const randomVals = new Uint32Array(len);
            crypto.getRandomValues(randomVals);
            
            for(let i=0; i<len; i++) {
                pwd += pool[randomVals[i] % pool.length];
            }
            
            out.textContent = pwd;
            
            // basic strength indicator
            let strength = 0;
            if(len >= 12) strength++;
            if(chkUpper.checked && chkLower.checked) strength++;
            if(chkNums.checked) strength++;
            if(chkSyms.checked) strength++;
            
            if(strength >= 4) out.className = 'pwd-display strong';
            else if(strength >= 2) out.className = 'pwd-display medium';
            else out.className = 'pwd-display weak';
        }

        document.getElementById('btn-gen').addEventListener('click', generate);
        
        document.getElementById('btn-copy').addEventListener('click', async () => {
            if(out.textContent === "Select options below" || out.textContent === "Select at least one option!") return;
            await navigator.clipboard.writeText(out.textContent);
            const btn = document.getElementById('btn-copy');
            btn.innerHTML = '<i class="bi bi-check"></i> Copied';
            setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy', 2000);
        });

        generate();
    });
</script>
{% endblock %}
