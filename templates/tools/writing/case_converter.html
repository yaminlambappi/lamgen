{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .editor-textarea { width: 100%; background: #0A0A0F; border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; resize: vertical; min-height: 250px; outline: none; margin-bottom: 1.5rem; }
    .editor-textarea:focus { border-color: var(--primary); }
    
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .btn-case { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 600; text-align: center; }
    .btn-case:hover { background: rgba(108,99,255,0.1); border-color: var(--primary); transform: translateY(-2px); }
    
    .action-bar { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1.5rem; margin-top: 1.5rem; }
    .btn-action { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 0.6rem 1.2rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn-action:hover { border-color: var(--primary); }
    .btn-action.primary { background: linear-gradient(135deg, var(--primary), var(--accent)); border: none; color: #000; }
</style>
{% endblock %}

{% block tool_content %}
<textarea id="text-input" class="editor-textarea" placeholder="Paste your text here to convert case..."></textarea>

<div class="btn-grid">
    <button class="btn-case" data-type="upper">UPPERCASE</button>
    <button class="btn-case" data-type="lower">lowercase</button>
    <button class="btn-case" data-type="title">Title Case</button>
    <button class="btn-case" data-type="sentence">Sentence case.</button>
    <button class="btn-case" data-type="camel">camelCase</button>
    <button class="btn-case" data-type="pascal">PascalCase</button>
    <button class="btn-case" data-type="snake">snake_case</button>
    <button class="btn-case" data-type="kebab">kebab-case</button>
    <button class="btn-case" data-type="alternating">aLtErNaTiNg</button>
    <button class="btn-case" data-type="inverse">InVeRsE</button>
</div>

<div class="action-bar">
    <div style="color: var(--muted); font-size: 0.9rem;" id="char-count">0 characters</div>
    <div style="display: flex; gap: 1rem;">
        <button class="btn-action" id="btn-clear"><i class="bi bi-trash"></i> Clear</button>
        <button class="btn-action primary" id="btn-copy"><i class="bi bi-clipboard"></i> Copy Text</button>
    </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('text-input');
        const charCount = document.getElementById('char-count');
        
        input.addEventListener('input', () => {
            charCount.textContent = `${input.value.length} characters`;
        });
        
        function toTitleCase(str) {
            return str.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
        }
        
        function toSentenceCase(str) {
            return str.replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
        }
        
        function toCamelCase(str) {
            return str.replace(/(?:^\w|[A-Z]|\b\w|\s+)/g, (match, index) => {
                if (+match === 0) return ""; // or if (/\s+/.test(match)) for white spaces
                return index === 0 ? match.toLowerCase() : match.toUpperCase();
            });
        }

        const conversions = {
            upper: (str) => str.toUpperCase(),
            lower: (str) => str.toLowerCase(),
            title: toTitleCase,
            sentence: (str) => toSentenceCase(str.toLowerCase()),
            camel: toCamelCase,
            pascal: (str) => { const c = toCamelCase(str); return c.charAt(0).toUpperCase() + c.slice(1); },
            snake: (str) => str.match(/[A-Z]{2,}(?=[A-Z][a-z]+[0-9]*|\b)|[A-Z]?[a-z]+[0-9]*|[A-Z]|[0-9]+/g).map(x => x.toLowerCase()).join('_'),
            kebab: (str) => str.match(/[A-Z]{2,}(?=[A-Z][a-z]+[0-9]*|\b)|[A-Z]?[a-z]+[0-9]*|[A-Z]|[0-9]+/g).map(x => x.toLowerCase()).join('-'),
            alternating: (str) => str.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join(''),
            inverse: (str) => str.split('').map((c, i) => i % 2 === 0 ? c.toUpperCase() : c.toLowerCase()).join('')
        };
        
        document.querySelectorAll('.btn-case').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                if (input.value && conversions[type]) {
                    try {
                        input.value = conversions[type](input.value);
                    } catch(e) {}
                    input.dispatchEvent(new Event('input'));
                }
            });
        });
        
        document.getElementById('btn-clear').addEventListener('click', () => {
            input.value = '';
            input.dispatchEvent(new Event('input'));
            input.focus();
        });
        
        document.getElementById('btn-copy').addEventListener('click', () => {
            if (input.value) {
                navigator.clipboard.writeText(input.value);
                const btn = document.getElementById('btn-copy');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="bi bi-check2"></i> Copied';
                setTimeout(() => btn.innerHTML = orig, 2000);
            }
        });
    });
</script>
{% endblock %}
