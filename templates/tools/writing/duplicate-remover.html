{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.tool-code{width:100%;min-height:180px;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s;box-sizing:border-box}
.tool-code:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.tool-code.out{background:rgba(0,0,0,.4);cursor:default}
.tool-code::placeholder{color:rgba(255,255,255,.2)}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}}
.check-row{display:flex;align-items:center;gap:8px;font-size:.88rem;cursor:pointer;user-select:none}
.check-row input{accent-color:var(--primary);width:16px;height:16px}
.meta-row{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted)}
.meta-item{display:flex;align-items:center;gap:5px}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div class="grid-2">
    <div>
      <div class="tool-label">Input Text</div>
      <textarea class="tool-code" id="input-text" placeholder="Paste lines here...&#10;Line 1&#10;Line 2&#10;Line 1&#10;Line 3"></textarea>
    </div>
    <div>
      <div class="tool-label">Output</div>
      <textarea class="tool-code out" id="output-text" readonly placeholder="Result will appear here..."></textarea>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:8px">
    <label class="check-row"><input type="checkbox" id="case-insensitive"> Case-insensitive comparison</label>
    <label class="check-row"><input type="checkbox" id="sort-output"> Sort output alphabetically</label>
    <label class="check-row"><input type="checkbox" id="remove-blank"> Remove blank lines</label>
    <label class="check-row"><input type="checkbox" id="trim-ws"> Trim whitespace from each line</label>
  </div>

  <div class="act-row">
    <button class="btn-go" onclick="removeDuplicates()"><i class="bi bi-funnel"></i> Remove Duplicates</button>
    <button class="btn-sm" onclick="copyResult()"><i class="bi bi-clipboard"></i> Copy Result</button>
    <div class="status" id="status"></div>
  </div>

  <div class="meta-row" id="stats" style="display:none">
    <span class="meta-item"><i class="bi bi-list-ul"></i> <span id="orig-count">0</span> original lines</span>
    <span class="meta-item"><i class="bi bi-check2-all"></i> <span id="unique-count">0</span> unique lines</span>
    <span class="meta-item"><i class="bi bi-trash"></i> <span id="removed-count">0</span> duplicates removed</span>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status ok';
  el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + msg;
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status err';
  el.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> ' + msg;
}

function removeDuplicates() {
  const input = document.getElementById('input-text').value;
  if (!input.trim()) { showErr('status', 'Please enter some text'); return; }

  let lines = input.split('\n');
  const origCount = lines.length;

  if (document.getElementById('trim-ws').checked) lines = lines.map(l => l.trim());
  if (document.getElementById('remove-blank').checked) lines = lines.filter(l => l.trim() !== '');

  const caseInsensitive = document.getElementById('case-insensitive').checked;
  const seen = new Set();
  const unique = lines.filter(line => {
    const key = caseInsensitive ? line.toLowerCase() : line;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  if (document.getElementById('sort-output').checked) unique.sort((a,b) => a.localeCompare(b));

  const result = unique.join('\n');
  document.getElementById('output-text').value = result;

  const removed = origCount - unique.length;
  document.getElementById('orig-count').textContent = origCount;
  document.getElementById('unique-count').textContent = unique.length;
  document.getElementById('removed-count').textContent = removed;
  document.getElementById('stats').style.display = 'flex';
  showOk('status', removed + ' duplicate(s) removed');
}

function copyResult() {
  const result = document.getElementById('output-text').value;
  if (!result) return;
  const btn = event.target.closest('button');
  copyText(result, btn);
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') removeDuplicates();
});
</script>
{% endblock %}
