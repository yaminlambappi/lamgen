{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.tool-code{width:100%;min-height:100px;padding:14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;line-height:1.6;resize:vertical;outline:none;transition:border-color .2s;box-sizing:border-box}
.tool-code:focus{border-color:var(--primary)}
.tool-code::placeholder{color:rgba(255,255,255,.2)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.fancy-grid{display:flex;flex-direction:column;gap:8px}
.fancy-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:10px}
.fancy-name{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;min-width:120px;flex-shrink:0}
.fancy-result{flex:1;font-size:1.1rem;color:var(--text);word-break:break-all;line-height:1.5}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div>
    <div class="tool-label">Input Text</div>
    <textarea class="tool-code" id="input-text" placeholder="Type your text here..." oninput="generateFancy()"></textarea>
  </div>

  <div>
    <div class="tool-label">Fancy Styles</div>
    <div class="fancy-grid" id="fancy-grid"></div>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}

const NORMAL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

function makeMap(from, to) {
  const map = {};
  for (let i = 0; i < from.length; i++) map[from[i]] = to[i];
  return map;
}

function applyMap(text, map) {
  return text.split('').map(c => map[c] || c).join('');
}

const STYLES = [
  {
    name: 'Bold',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵'))
  },
  {
    name: 'Italic',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝘈𝘉𝘊𝘋𝘌𝘍𝘎𝘏𝘐𝘑𝘒𝘓𝘔𝘕𝘖𝘗𝘘𝘙𝘚𝘛𝘜𝘝𝘞𝘟𝘠𝘡𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝘬𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻0123456789'))
  },
  {
    name: 'Bold Italic',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯0123456789'))
  },
  {
    name: 'Monospace',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝙰𝙱𝙲𝙳𝙴𝙵𝙶𝙷𝙸𝙹𝙺𝙻𝙼𝙽𝙾𝙿𝚀𝚁𝚂𝚃𝚄𝚅𝚆𝚇𝚈𝚉𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣𝟶𝟷𝟸𝟹𝟺𝟻𝟼𝟽𝟾𝟿'))
  },
  {
    name: 'Double Struck',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫𝟘𝟙𝟚𝟛𝟜𝟝𝟞𝟟𝟠𝟡'))
  },
  {
    name: 'Fraktur',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝔄𝔅ℭ𝔇𝔈𝔉𝔊ℌℑ𝔍𝔎𝔏𝔐𝔑𝔒𝔓𝔔ℜ𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷0123456789'))
  },
  {
    name: 'Script',
    fn: t => applyMap(t, makeMap(NORMAL,
      '𝒜ℬ𝒞𝒟ℰℱ𝒢ℋℐ𝒥𝒦ℒℳ𝒩𝒪𝒫𝒬ℛ𝒮𝒯𝒰𝒱𝒲𝒳𝒴𝒵𝒶𝒷𝒸𝒹ℯ𝒻ℊ𝒽𝒾𝒿𝓀𝓁𝓂𝓃ℴ𝓅𝓆𝓇𝓈𝓉𝓊𝓋𝓌𝓍𝓎𝓏0123456789'))
  },
  {
    name: 'Small Caps',
    fn: t => applyMap(t, makeMap('abcdefghijklmnopqrstuvwxyz','ᴀʙᴄᴅᴇꜰɢʜɪᴊᴋʟᴍɴᴏᴘǫʀꜱᴛᴜᴠᴡxʏᴢ'))
  },
  {
    name: 'Strikethrough',
    fn: t => t.split('').map(c => c + '\u0336').join('')
  },
  {
    name: 'Underline',
    fn: t => t.split('').map(c => c + '\u0332').join('')
  },
  {
    name: 'Overline',
    fn: t => t.split('').map(c => c + '\u0305').join('')
  },
  {
    name: 'Flip Upside Down',
    fn: t => {
      const map = {'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ','k':'ʞ','l':'l','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ','u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z','A':'∀','B':'ᗺ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'פ','H':'H','I':'I','J':'ɾ','K':'ʞ','L':'˥','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Q','R':'ᴚ','S':'S','T':'┴','U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z','0':'0','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6','!':'¡','?':'¿',',':'\'','\'':','};
      return t.split('').map(c => map[c] || c).reverse().join('');
    }
  },
  {
    name: 'Bubble Text',
    fn: t => applyMap(t, makeMap(NORMAL,
      'ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ⓪①②③④⑤⑥⑦⑧⑨'))
  },
  {
    name: 'Square Text',
    fn: t => applyMap(t, makeMap('ABCDEFGHIJKLMNOPQRSTUVWXYZ','🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉'))
  },
  {
    name: 'Wide Text',
    fn: t => t.split('').map(c => {
      const code = c.charCodeAt(0);
      if (code >= 33 && code <= 126) return String.fromCharCode(code + 65248);
      return c;
    }).join('')
  },
  {
    name: 'Zalgo (Light)',
    fn: t => t.split('').map(c => {
      if (c === ' ') return c;
      const zalgo = ['\u0300','\u0301','\u0302','\u0303','\u0308'];
      return c + zalgo[Math.floor(Math.random()*zalgo.length)];
    }).join('')
  },
];

function generateFancy() {
  const text = document.getElementById('input-text').value;
  const grid = document.getElementById('fancy-grid');
  if (!text) { grid.innerHTML = ''; return; }
  grid.innerHTML = STYLES.map(s => {
    const result = s.fn(text);
    return `<div class="fancy-item">
      <span class="fancy-name">${s.name}</span>
      <span class="fancy-result">${result}</span>
      <button class="btn-sm" style="flex-shrink:0;padding:5px 10px" onclick="copyText(${JSON.stringify(result)},this)"><i class="bi bi-clipboard"></i></button>
    </div>`;
  }).join('');
}
</script>
{% endblock %}
