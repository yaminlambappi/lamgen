{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
    .editor-pane { border: 1px solid var(--border); border-radius: 12px; background: #0A0A0F; padding: 1rem; margin-bottom: 2rem; }
    .editor-content { width: 100%; height: 150px; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1.2rem; line-height: 1.6; resize: none; outline: none; }
    
    .results-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    .fancy-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.2s; }
    .fancy-item:hover { border-color: var(--primary); background: rgba(108,99,255,0.05); }
    .fancy-text-disp { font-size: 1.5rem; color: var(--text); flex-grow: 1; word-break: break-all; margin-right: 1rem; }
</style>
{% endblock %}

{% block tool_content %}
<div class="editor-pane">
    <textarea id="text-input" class="editor-content" placeholder="Type your text here to convert it..."></textarea>
</div>

<div class="results-grid" id="results">
    <!-- Results populated here -->
    <div style="text-align: center; color: var(--muted); padding: 2rem;">Type something above to see fancy fonts!</div>
</div>
{% endblock %}

{% block tool_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('text-input');
        const results = document.getElementById('results');

        const alphabets = {
            normal: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
            mathBold: "рқҗҡрқҗӣрқҗңрқҗқрқҗһрқҗҹрқҗ рқҗЎрқҗўрқҗЈрқҗӨрқҗҘрқҗҰрқҗ§рқҗЁрқҗ©рқҗӘрқҗ«рқҗ¬рқҗӯрқҗ®рқҗҜрқҗ°рқҗұрқҗІрқҗірқҗҖрқҗҒрқҗӮрқҗғрқҗ„рқҗ…рқҗҶрқҗҮрқҗҲрқҗүрқҗҠрқҗӢрқҗҢрқҗҚрқҗҺрқҗҸрқҗҗрқҗ‘рқҗ’рқҗ“рқҗ”рқҗ•рқҗ–рқҗ—рқҗҳрқҗҷрқҹҺрқҹҸрқҹҗрқҹ‘рқҹ’рқҹ“рқҹ”рқҹ•рқҹ“рқҹ—",
            mathItalic: "рқ‘Һрқ‘Ҹрқ‘җрқ‘‘рқ‘’рқ‘“рқ‘”рқ‘•рқ‘–рқ‘—рқ‘ҳрқ‘ҷрқ‘ҡрқ‘ӣрқ‘ңрқ‘қрқ‘һрқ‘ҹрқ‘ рқ‘Ўрқ‘ўрқ‘Јрқ‘Өрқ‘Ҙрқ‘Ұрқ‘§рқҗҙрқҗөрқҗ¶рқҗ·рқҗёрқҗ№рқҗәрқҗ»рқҗјрқҗҪрқҗҫрқҗҝрқ‘Җрқ‘Ғрқ‘Ӯрқ‘ғрқ‘„рқ‘…рқ‘Ҷрқ‘Үрқ‘Ҳрқ‘үрқ‘Ҡрқ‘Ӣрқ‘Ңрқ‘Қ0123456789",
            script: "рқ’¶рқ’·рқ’ёрқ’№рқ‘’рқ’»рқ‘”рқ’Ҫрқ’ҫрқ’ҝрқ“Җрқ“Ғрқ“Ӯрқ“ғрқ‘ңрқ“…рқ“Ҷрқ“Үрқ“Ҳрқ“үрқ“Ҡрқ“Ӣрқ“Ңрқ“Қрқ“Һрқ“Ҹрқ’ңрқҗөрқ’һрқ’ҹрқҗёрқҗ№рқ’ўрқҗ»рқҗјрқ’Ҙрқ’Ұрқҗҝрқ‘Җрқ’©рқ’Әрқ’«рқ’¬рқ‘…рқ’®рқ’Ҝрқ’°рқ’ұрқ’Ірқ’ірқ’ҙрқ’ө0123456789",
            gothic: "рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·рқ”„рқ”…рқ”Ҷрқ”Үрқ”Ҳрқ”үрқ”Ҡрқ”Ӣрқ”Ңрқ”Қрқ”Һрқ”Ҹрқ”җрқ”‘рқ”’рқ”“рқ””в„ңрқ”–рқ”—рқ”ҳрқ”ҷрқ”ҡрқ”ӣрқ”ңрқ”·0123456789",
            doubleStruck: "рқ•’рқ•“рқ•”рқ••рқ•–рқ•—рқ•ҳрқ•ҷрқ•ҡрқ•ӣрқ•ңрқ•қрқ•һрқ•ҹрқ• рқ•Ўрқ•ўрқ•Јрқ•Өрқ•Ҙрқ•Ұрқ•§рқ•Ёрқ•©рқ•Әрқ•«рқ”ёрқ”№в„Ӯрқ”»рқ”јрқ”Ҫрқ”ҫв„Қрқ•Җрқ•Ғрқ•Ӯрқ•ғрқ•„в„•рқ•Ҷв„ҷв„ҡв„қрқ•Ҡрқ•Ӣрқ•Ңрқ•Қрқ•Һрқ•Ҹрқ•җв„Өрқҹҳрқҹҷрқҹҡрқҹӣрқҹңрқҹқрқҹһрқҹҹрқҹ рқҹЎ",
            circled: "в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹв“Әв‘ в‘Ўв‘ўв‘Јв‘Өв‘Ҙв‘Ұв‘§в‘Ё",
            squared: "рҹ„°рҹ„ұрҹ„Ірҹ„ірҹ„ҙрҹ„өрҹ„¶рҹ„·рҹ„ёрҹ„№рҹ„әрҹ„»рҹ„јрҹ„Ҫрҹ„ҫрҹ„ҝрҹ…Җрҹ…Ғрҹ…Ӯрҹ…ғрҹ…„рҹ……рҹ…Ҷрҹ…Үрҹ…Ҳрҹ…үрҹ„°рҹ„ұрҹ„Ірҹ„ірҹ„ҙрҹ„өрҹ„¶рҹ„·рҹ„ёрҹ„№рҹ„әрҹ„»рҹ„јрҹ„Ҫрҹ„ҫрҹ„ҝрҹ…Җрҹ…Ғрҹ…Ӯрҹ…ғрҹ…„рҹ……рҹ…Ҷрҹ…Үрҹ…Ҳрҹ…ү0123456789",
            upsideDown: "ЙҗqЙ”pЗқЙҹЖғЙҘДұЙҫКһlЙҜuodbЙ№sКҮnКҢКҚxКҺzвҲҖрҗҗ’ЖҶб—ЎЖҺв„Ів…ҒHIЕҝКһЛҘWNOФҖбҪүбҙҡSвҠҘвҲ©ОӣMXв…„Z0Ж–б„…Жҗг„ЈПӣ9г„Ҙ86"
        };

        function translate(text, targetAlphabet) {
            let res = '';
            for(let i=0; i<text.length; i++) {
                let char = text[i];
                let index = alphabets.normal.indexOf(char);
                if (index !== -1 && index < targetAlphabet.length) {
                    res += Array.from(targetAlphabet)[index];
                } else {
                    res += char;
                }
            }
            return res;
        }

        input.addEventListener('input', () => {
            const txt = input.value;
            if(!txt) {
                results.innerHTML = '<div style="text-align: center; color: var(--muted); padding: 2rem;">Type something above to see fancy fonts!</div>';
                return;
            }

            let html = '';
            for(const [style, chars] of Object.entries(alphabets)) {
                if (style === 'normal') continue;
                let fancyText = style === 'upsideDown' ? translate(txt.split('').reverse().join(''), chars) : translate(txt, chars);
                html += `
                <div class="fancy-item">
                    <div class="fancy-text-disp">${fancyText}</div>
                    <button class="btn-ghost-nexus btn-copy" data-text="${fancyText}"><i class="bi bi-clipboard"></i> Copy</button>
                </div>`;
            }
            results.innerHTML = html;

            document.querySelectorAll('.btn-copy').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await navigator.clipboard.writeText(btn.dataset.text);
                    btn.innerHTML = '<i class="bi bi-check"></i> Copied';
                    setTimeout(() => btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy', 2000);
                });
            });
        });
    });
</script>
{% endblock %}
