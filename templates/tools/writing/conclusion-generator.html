{% extends "tools/tool_base.html" %}
{% load static %}

{% block tool_css %}
<style>
.dev-tool-wrap{display:flex;flex-direction:column;gap:1.25rem}
.tool-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:.4rem}
.act-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-go{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:linear-gradient(135deg,var(--primary),#8B85FF);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(108,99,255,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}
.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-sm:hover{background:rgba(255,255,255,.1)}
.status{display:none;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.status.err{display:flex;background:rgba(255,107,107,.1);color:#FF6B6B;border:1px solid rgba(255,107,107,.25)}
.status.ok{display:flex;background:rgba(0,245,212,.08);color:var(--accent);border:1px solid rgba(0,245,212,.2)}
.num-input,.select-input,.text-input{width:100%;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;box-sizing:border-box;transition:border-color .2s}
.num-input:focus,.select-input:focus,.text-input:focus{border-color:var(--primary)}
.select-input option{background:#0F0F1A}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}}
.conc-item{padding:16px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:12px}
.conc-type{font-size:.72rem;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.conc-text{font-size:.9rem;color:var(--text);line-height:1.7}
.conc-actions{margin-top:10px;display:flex;gap:6px}
.kp-item{display:flex;gap:8px;align-items:center}
.kp-item input{flex:1;padding:8px 12px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
.kp-item input:focus{border-color:var(--primary)}
</style>
{% endblock %}

{% block tool_content %}
<div class="dev-tool-wrap">
  <div class="grid-2">
    <div>
      <div class="tool-label">Topic</div>
      <input type="text" class="text-input" id="topic" placeholder="e.g. renewable energy, digital marketing">
    </div>
    <div>
      <div class="tool-label">Call to Action (optional)</div>
      <input type="text" class="text-input" id="cta" placeholder="e.g. start today, learn more, take action">
    </div>
  </div>

  <div>
    <div class="tool-label">Key Points (up to 5)</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div class="kp-item"><span style="color:var(--muted);font-size:.8rem;min-width:16px">1.</span><input type="text" id="kp1" placeholder="Key point 1"></div>
      <div class="kp-item"><span style="color:var(--muted);font-size:.8rem;min-width:16px">2.</span><input type="text" id="kp2" placeholder="Key point 2"></div>
      <div class="kp-item"><span style="color:var(--muted);font-size:.8rem;min-width:16px">3.</span><input type="text" id="kp3" placeholder="Key point 3"></div>
      <div class="kp-item"><span style="color:var(--muted);font-size:.8rem;min-width:16px">4.</span><input type="text" id="kp4" placeholder="Key point 4 (optional)"></div>
      <div class="kp-item"><span style="color:var(--muted);font-size:.8rem;min-width:16px">5.</span><input type="text" id="kp5" placeholder="Key point 5 (optional)"></div>
    </div>
  </div>

  <div class="act-row">
    <button class="btn-go" onclick="generateConclusions()"><i class="bi bi-magic"></i> Generate Conclusions</button>
    <div class="status" id="status"></div>
  </div>

  <div id="concs-list" style="display:flex;flex-direction:column;gap:12px"></div>
</div>
{% endblock %}

{% block tool_js %}
<script>
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="bi bi-check2"></i> Copied!';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
  });
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status err';
  el.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> ' + msg;
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  el.className = 'status ok';
  el.innerHTML = '<i class="bi bi-check-circle-fill"></i> ' + msg;
}

function generateConclusions() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { showErr('status', 'Please enter a topic'); return; }
  const cta = document.getElementById('cta').value.trim() || 'take the next step';
  const kps = [1,2,3,4,5].map(i => document.getElementById('kp'+i).value.trim()).filter(Boolean);
  const kpStr = kps.length ? kps.join(', ') : 'the key principles discussed';
  const T = topic;

  const conclusions = [
    {
      type: 'Summary + Call to Action',
      text: `In conclusion, ${T} represents a pivotal area that demands our attention and action. Throughout this discussion, we have explored ${kpStr}. The evidence is clear: understanding and engaging with ${T} is no longer optional. Now is the time to ${cta} and make a meaningful difference.`
    },
    {
      type: 'Restate Thesis + Implications',
      text: `As we have seen, ${T} is far more than a passing trend — it is a fundamental shift with lasting implications. By examining ${kpStr}, we gain a deeper appreciation for the complexity and importance of this subject. The implications extend beyond the immediate context, shaping how we approach challenges for years to come.`
    },
    {
      type: 'Future Outlook',
      text: `Looking ahead, the future of ${T} is both promising and challenging. As we continue to grapple with ${kpStr}, new opportunities and obstacles will emerge. Those who invest in understanding ${T} today will be best positioned to navigate tomorrow's landscape. The journey is just beginning, and the possibilities are limitless.`
    },
    {
      type: 'Question to Ponder',
      text: `After exploring ${T} through the lens of ${kpStr}, one question remains: what will you do with this knowledge? The insights gained here are only valuable if they inspire action. As you move forward, consider how ${T} applies to your own context and what steps you can take to ${cta}.`
    },
    {
      type: 'Memorable Closing Statement',
      text: `${T} is not just a concept — it is a call to action. The ideas explored here, from ${kpStr}, paint a picture of a world where informed, engaged individuals make a real difference. Let this be the moment you commit to deeper understanding and meaningful engagement with ${T}. The time to ${cta} is now.`
    },
  ];

  const container = document.getElementById('concs-list');
  container.innerHTML = conclusions.map(c => `
    <div class="conc-item">
      <div class="conc-type">${c.type}</div>
      <div class="conc-text">${c.text}</div>
      <div class="conc-actions">
        <button class="btn-sm" style="padding:5px 10px;font-size:.78rem" onclick="copyText(${JSON.stringify(c.text)},this)"><i class="bi bi-clipboard"></i> Copy</button>
      </div>
    </div>
  `).join('');
  showOk('status', '5 conclusions generated');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateConclusions();
});
</script>
{% endblock %}
