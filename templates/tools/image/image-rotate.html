{% extends "tools/tool_base.html" %}

{% block tool_css %}
<style>
.upload-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.02); margin-bottom: 1.5rem; }
.upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: rgba(108,99,255,0.05); }
.controls-panel { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; display: none; }
.btn-ctrl { background: rgba(255,255,255,0.07); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
.btn-ctrl:hover { border-color: var(--primary); color: var(--primary); }
.btn-ctrl.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.preview-box { border: 1px solid var(--border); border-radius: 12px; padding: 1rem; background: rgba(0,0,0,0.4); text-align: center; display: none; }
.preview-box img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-bottom: 0.8rem; object-fit: contain; }
.btn-dl { display: inline-block; padding: 0.7rem 2rem; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; text-decoration: none; border-radius: 8px; font-weight: 700; transition: transform 0.2s; border: none; cursor: pointer; }
.btn-dl:hover { transform: translateY(-2px); color: #000; }
</style>
{% endblock %}

{% block tool_content %}
<div class="upload-zone" id="drop-zone">
  <div style="font-size:3rem;margin-bottom:0.8rem;">🔄</div>
  <h3 style="margin-bottom:0.5rem;">Upload Image to Rotate or Flip</h3>
  <p style="color:var(--muted);font-size:0.9rem;">Supports JPG, PNG, WebP · 100% local</p>
  <input type="file" id="file-input" accept="image/*" style="display:none;">
</div>

<div class="controls-panel" id="controls">
  <div style="margin-bottom:1rem;">
    <span style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:0.6rem;">Rotate</span>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn-ctrl" onclick="applyTransform('rotate', 90)">↻ 90° CW</button>
      <button class="btn-ctrl" onclick="applyTransform('rotate', -90)">↺ 90° CCW</button>
      <button class="btn-ctrl" onclick="applyTransform('rotate', 180)">↕ 180°</button>
      <button class="btn-ctrl" onclick="applyTransform('rotate', 270)">↻ 270° CW</button>
    </div>
  </div>
  <div style="margin-bottom:1rem;">
    <span style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:0.6rem;">Flip</span>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button class="btn-ctrl" onclick="applyTransform('flipH')">⇔ Flip Horizontal</button>
      <button class="btn-ctrl" onclick="applyTransform('flipV')">⇕ Flip Vertical</button>
    </div>
  </div>
  <div>
    <span style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:0.6rem;">Custom Angle</span>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <input type="number" id="custom-angle" style="background:rgba(0,0,0,0.5);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.8rem;border-radius:8px;outline:none;width:100px;" placeholder="0" min="-360" max="360">
      <button class="btn-ctrl" onclick="applyTransform('rotate', parseInt(document.getElementById('custom-angle').value)||0)">Apply</button>
    </div>
  </div>
</div>

<div class="preview-box" id="preview-box">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;">
    <span style="font-size:0.8rem;color:var(--muted);">Dimensions: <strong id="dims-out" style="color:var(--text);">—</strong></span>
    <button class="btn-ctrl" onclick="resetTransform()">↺ Reset</button>
  </div>
  <img id="img-out" src="" alt="Result">
  <div style="margin-top:0.8rem;">
    <a id="btn-download" class="btn-dl" download="rotated.png"><i class="bi bi-download"></i> Download</a>
  </div>
</div>
{% endblock %}

{% block tool_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  let origImg = new Image(), origFile = null;
  let currentAngle = 0, flipH = false, flipV = false;
  let isProcessing = false; // Flag to prevent multiple triggers

  dropZone.addEventListener('click', (e) => {
    if (!isProcessing) {
      isProcessing = true;
      fileInput.click();
      setTimeout(() => { isProcessing = false; }, 200);
    }
  });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { 
    if (e.target.files[0] && !isProcessing) {
      isProcessing = true;
      handleFile(e.target.files[0]);
      setTimeout(() => { isProcessing = false; }, 200);
    }
});

  function handleFile(file) {
    if (!file.type.startsWith('image/')) { alert('Please upload an image file.'); return; }
    origFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      origImg.src = e.target.result;
      origImg.onload = () => {
        currentAngle = 0; flipH = false; flipV = false;
        document.getElementById('controls').style.display = 'block';
        renderTransform();
      };
    };
    reader.readAsDataURL(file);
  }

  window.applyTransform = (type, val) => {
    if (type === 'rotate') currentAngle = ((currentAngle + val) % 360 + 360) % 360;
    else if (type === 'flipH') flipH = !flipH;
    else if (type === 'flipV') flipV = !flipV;
    renderTransform();
  };

  window.resetTransform = () => { currentAngle = 0; flipH = false; flipV = false; renderTransform(); };

  function renderTransform() {
    const rad = currentAngle * Math.PI / 180;
    const sin = Math.abs(Math.sin(rad));
    const cos = Math.abs(Math.cos(rad));
    const w = Math.round(origImg.width * cos + origImg.height * sin);
    const h = Math.round(origImg.width * sin + origImg.height * cos);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.translate(w / 2, h / 2);
    ctx.rotate(rad);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
    ctx.drawImage(origImg, -origImg.width / 2, -origImg.height / 2);
    const fmt = origFile.type === 'image/jpeg' ? 'image/jpeg' : 'image/png';
    const dataUrl = canvas.toDataURL(fmt, 0.92);
    document.getElementById('img-out').src = dataUrl;
    document.getElementById('dims-out').textContent = `${w} × ${h}`;
    const ext = fmt === 'image/jpeg' ? 'jpg' : 'png';
    const btn = document.getElementById('btn-download');
    btn.href = dataUrl;
    btn.download = (origFile.name.replace(/\.[^/.]+$/, '') || 'image') + `-rotated.${ext}`;
    document.getElementById('preview-box').style.display = 'block';
  }
});
</script>
{% endblock %}
