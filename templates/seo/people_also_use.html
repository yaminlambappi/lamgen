<!-- People Also Use Component -->
<div class="people-also-use-section">
    <div class="section-header">
        <h2 class="section-title">
            <i class="bi bi-people"></i>
            <span>People Also Use</span>
        </h2>
        <p class="section-description">Popular tools used by others in this category</p>
    </div>

    <div class="people-also-use-grid" id="people-also-use-container">
        <div class="loading-spinner">
            <i class="bi bi-arrow-repeat"></i>
            <span>Loading popular tools...</span>
        </div>
    </div>

    <div class="people-also-use-actions">
        <button class="btn-secondary" onclick="loadMorePeopleAlsoUse()">
            <i class="bi bi-plus-circle"></i>
            Load More
        </button>
    </div>
</div>

<style>
.people-also-use-section {
    background: var(--lg-card-bg);
    border: 1px solid var(--lg-card-border);
    border-radius: 16px;
    padding: 2rem;
    margin: 2rem 0;
}

.section-header {
    text-align: center;
    margin-bottom: 2rem;
}

.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--lg-text);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0 0 1rem;
}

.section-title i {
    color: var(--lg-violet);
    font-size: 1.5rem;
}

.section-description {
    color: var(--lg-text-muted);
    font-size: 1rem;
    margin: 0;
}

.people-also-use-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
    min-height: 200px;
}

.people-tool-card {
    background: var(--lg-card-bg);
    border: 1px solid var(--lg-card-border);
    border-radius: 12px;
    padding: 1.5rem;
    text-decoration: none;
    color: var(--lg-text);
    transition: all 0.3s ease;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
}

.people-tool-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    border-color: var(--lg-primary);
}

.people-tool-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
}

.people-tool-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--lg-primary), var(--lg-violet));
    border-radius: 10px;
    flex-shrink: 0;
}

.people-tool-icon i {
    color: white;
    font-size: 1.5rem;
}

.people-tool-content {
    flex: 1;
    min-width: 0;
}

.people-tool-title {
    font-size: 1.2rem;
    font-weight: 600;
    margin: 0 0 0.5rem;
    color: var(--lg-text);
    line-height: 1.4;
}

.people-tool-description {
    font-size: 0.9rem;
    color: var(--lg-text-muted);
    margin: 0 0 0.5rem;
    line-height: 1.5;
}

.people-tool-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: auto;
}

.people-tool-stats {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.8rem;
    color: var(--lg-text-muted);
}

.people-tool-usage {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.people-tool-usage i {
    color: var(--lg-cyan);
    font-size: 0.9rem;
}

.people-tool-position {
    background: rgba(100, 90, 255, 0.1);
    color: var(--lg-primary);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
}

.people-also-use-actions {
    text-align: center;
    margin-top: 2rem;
}

.loading-spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 3rem;
    color: var(--lg-text-muted);
}

.loading-spinner i {
    font-size: 2rem;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .people-also-use-grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
    }
    
    .people-tool-card {
        flex-direction: column;
        text-align: center;
    }
    
    .section-title {
        font-size: 1.5rem;
    }
}
</style>

<script>
// People Also Use Component
let peopleAlsoUseOffset = 0;
let isLoadingPeopleAlsoUse = false;

async function loadPeopleAlsoUse(toolId, limit = 6) {
    if (isLoadingPeopleAlsoUse) return;
    
    const container = document.getElementById('people-also-use-container');
    if (!container) return;
    
    isLoadingPeopleAlsoUse = true;
    container.innerHTML = '<div class="loading-spinner"><i class="bi bi-arrow-repeat"></i><span>Loading popular tools...</span></div>';
    
    try {
        const response = await fetch(`/tools/api/people-also-use/${toolId}/?limit=${limit}&offset=${peopleAlsoUseOffset}`);
        const data = await response.json();
        
        if (data.tools && data.tools.length > 0) {
            renderPeopleAlsoUse(data.tools, data.hasMore);
            peopleAlsoUseOffset += data.tools.length;
        } else {
            container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--lg-text-muted);">No popular tools found.</div>';
        }
    } catch (error) {
        container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--lg-danger);">Error loading popular tools.</div>';
    } finally {
        isLoadingPeopleAlsoUse = false;
    }
}

function renderPeopleAlsoUse(tools, hasMore = false) {
    const container = document.getElementById('people-also-use-container');
    if (!container) return;
    
    const toolsHtml = tools.map((tool, index) => `
        <a href="/tools/${tool.category_slug}/${tool.slug}/" class="people-tool-card">
            <div class="people-tool-header">
                <div class="people-tool-icon">
                    <i class="${tool.icon}"></i>
                </div>
                <div class="people-tool-content">
                    <div class="people-tool-title">${tool.name}</div>
                    <div class="people-tool-description">${tool.short_desc}</div>
                    <div class="people-tool-meta">
                        <div class="people-tool-stats">
                            <div class="people-tool-usage">
                                <i class="bi bi-eye"></i>
                                ${tool.usage_count || 0}
                            </div>
                            <div class="people-tool-position">
                                #${index + 1}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </a>
    `).join('');
    
    container.innerHTML = toolsHtml;
    
    // Update load more button
    const loadMoreBtn = container.parentElement.querySelector('.btn-secondary');
    if (loadMoreBtn) {
        if (hasMore) {
            loadMoreBtn.style.display = 'inline-flex';
        } else {
            loadMoreBtn.style.display = 'none';
        }
    }
}

function loadMorePeopleAlsoUse() {
    // This will be called when user clicks "Load More" button
    console.log('Load more people also use tools');
}
</script>
