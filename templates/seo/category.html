{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div style="max-width: 1000px; margin: 0 auto; padding: 4rem 1.5rem;">
    <div style="text-align: center; margin-bottom: 4rem;">
        <h1 style="font-family: 'Syne', sans-serif; font-size: 3rem; margin-bottom: 1rem;">{{ category.name }}</h1>
        <p style="color: var(--muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">{{ category.description }}</p>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
        {% for page in pages %}
        <a href="{{ page.get_absolute_url }}" class="glass-card" style="padding: 1.5rem; text-decoration: none; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s;">
            <div>
                <h3 style="color: var(--text); font-size: 1.1rem; margin-bottom: 0.5rem;">{{ page.topic }} {{ category.name }}</h3>
                <span style="color: var(--primary); font-size: 0.85rem; font-weight: 600;">{{ page.items|length }} Ideas</span>
            </div>
            <i class="bi bi-arrow-right" style="color: var(--muted);"></i>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
