<!-- Workflow Chaining Component -->
<div class="workflow-chaining-section">
    <div class="section-header">
        <h2 class="section-title">
            <i class="bi bi-diagram-3"></i>
            <span>Continue Workflow</span>
        </h2>
        <p class="section-description">Chain tools together for powerful automated workflows</p>
    </div>

    <div class="workflow-container" id="workflow-container">
        <div class="loading-spinner">
            <i class="bi bi-arrow-repeat"></i>
            <span>Loading workflow options...</span>
        </div>
    </div>

    <div class="workflow-actions">
        <button class="btn-primary" onclick="saveWorkflow()">
            <i class="bi bi-save"></i>
            Save Workflow
        </button>
        <button class="btn-secondary" onclick="clearWorkflow()">
            <i class="bi bi-trash"></i>
            Clear Workflow
        </button>
        <button class="btn-secondary" onclick="shareWorkflow()">
            <i class="bi bi-share"></i>
            Share Workflow
        </button>
    </div>
</div>

<style>
.workflow-chaining-section {
    background: var(--lg-card-bg);
    border: 1px solid var(--lg-card-border);
    border-radius: 16px;
    padding: 2rem;
    margin: 2rem 0;
}

.section-header {
    text-align: center;
    margin-bottom: 2rem;
}

.section-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--lg-text);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0 0 1rem;
}

.section-title i {
    color: var(--lg-violet);
    font-size: 1.5rem;
}

.section-description {
    color: var(--lg-text-muted);
    font-size: 1rem;
    margin: 0;
}

.workflow-container {
    background: var(--lg-card-bg);
    border: 1px solid var(--lg-card-border);
    border-radius: 12px;
    padding: 2rem;
    min-height: 200px;
    margin-bottom: 2rem;
}

.workflow-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2rem;
    margin-bottom: 2rem;
}

.workflow-step {
    background: rgba(100, 90, 255, 0.05);
    border: 1px solid rgba(100, 90, 255, 0.1);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    position: relative;
}

.workflow-step.active {
    background: rgba(100, 90, 255, 0.1);
    border-color: var(--lg-primary);
}

.workflow-step-number {
    position: absolute;
    top: -10px;
    left: -10px;
    width: 24px;
    height: 24px;
    background: var(--lg-primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 0.8rem;
}

.workflow-step-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
}

.workflow-tool-icon {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(100, 90, 255, 0.1);
    border-radius: 10px;
    margin-bottom: 1rem;
}

.workflow-tool-icon i {
    color: var(--lg-primary);
    font-size: 1.2rem;
}

.workflow-step-title {
    font-weight: 600;
    color: var(--lg-text);
    margin-bottom: 0.5rem;
}

.workflow-step-description {
    color: var(--lg-text-muted);
    font-size: 0.9rem;
    text-align: center;
}

.workflow-arrow {
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--lg-violet);
    font-size: 1.5rem;
}

.workflow-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-top: 2rem;
}

.btn-primary {
    background: var(--lg-primary);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-primary:hover {
    background: var(--lg-violet);
    transform: translateY(-2px);
}

.btn-secondary {
    background: transparent;
    color: var(--lg-primary);
    border: 2px solid var(--lg-primary);
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-secondary:hover {
    background: var(--lg-primary);
    color: white;
    transform: translateY(-2px);
}

.loading-spinner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 3rem;
    color: var(--lg-text-muted);
}

.loading-spinner i {
    font-size: 2rem;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@media (max-width: 768px) {
    .workflow-steps {
        grid-template-columns: 1fr;
    }
    
    .workflow-step {
        padding: 1rem;
    }
    
    .workflow-actions {
        flex-direction: column;
        gap: 1rem;
    }
    
    .btn-primary,
    .btn-secondary {
        width: 100%;
        justify-content: center;
    }
}
</style>

<script>
// Workflow Chaining Component
let currentWorkflow = [];
let workflowStep = 0;

async function loadWorkflowOptions(toolId) {
    const container = document.getElementById('workflow-container');
    if (!container) return;
    
    container.innerHTML = '<div class="loading-spinner"><i class="bi bi-arrow-repeat"></i><span>Loading workflow options...</span></div>';
    
    try {
        const response = await fetch(`/tools/api/workflow-options/${toolId}`);
        const data = await response.json();
        
        if (data.workflow_options && data.workflow_options.length > 0) {
            renderWorkflowOptions(data.workflow_options);
        } else {
            container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--lg-text-muted);">No workflow options available.</div>';
        }
    } catch (error) {
        container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--lg-danger);">Error loading workflow options.</div>';
    }
}

function renderWorkflowOptions(options) {
    const container = document.getElementById('workflow-container');
    if (!container) return;
    
    const workflowHtml = options.map((option, index) => `
        <div class="workflow-step" onclick="selectWorkflowStep(${index})">
            <div class="workflow-step-number">${index + 1}</div>
            <div class="workflow-step-content">
                <div class="workflow-tool-icon">
                    <i class="${option.tool_icon}"></i>
                </div>
                <div class="workflow-step-title">${option.tool_name}</div>
                <div class="workflow-step-description">${option.description}</div>
            </div>
            <div class="workflow-arrow">
                <i class="bi bi-arrow-right"></i>
            </div>
        </div>
    `).join('');
    
    container.innerHTML = `<div class="workflow-steps">${workflowHtml}</div>`;
}

function selectWorkflowStep(stepIndex) {
    // Update UI to show selected step
    const steps = document.querySelectorAll('.workflow-step');
    steps.forEach((step, index) => {
        if (index <= stepIndex) {
            step.classList.add('active');
        } else {
            step.classList.remove('active');
        }
    });
    
    workflowStep = stepIndex;
    updateWorkflowActions();
}

function updateWorkflowActions() {
    // Update action buttons based on current workflow state
    const saveBtn = document.querySelector('.btn-primary');
    const clearBtn = document.querySelector('.btn-secondary');
    const shareBtn = document.querySelectorAll('.btn-secondary')[1];
    
    if (currentWorkflow.length > 0) {
        saveBtn.style.display = 'inline-flex';
        clearBtn.style.display = 'inline-flex';
        shareBtn.style.display = 'inline-flex';
    } else {
        saveBtn.style.display = 'none';
        clearBtn.style.display = 'none';
        shareBtn.style.display = 'none';
    }
}

function saveWorkflow() {
    // Save current workflow to localStorage
    if (currentWorkflow.length > 0) {
        localStorage.setItem('lamgen_workflow', JSON.stringify(currentWorkflow));
        
        // Show success message
        const container = document.getElementById('workflow-container');
        const message = document.createElement('div');
        message.className = 'workflow-saved';
        message.innerHTML = '<i class="bi bi-check-circle"></i> Workflow saved successfully!';
        container.appendChild(message);
        
        setTimeout(() => {
            if (message.parentNode) {
                message.parentNode.removeChild(message);
            }
        }, 3000);
    }
}

function clearWorkflow() {
    // Clear current workflow
    currentWorkflow = [];
    workflowStep = 0;
    
    // Clear UI
    const steps = document.querySelectorAll('.workflow-step');
    steps.forEach(step => step.classList.remove('active'));
    
    updateWorkflowActions();
    
    // Clear localStorage
    localStorage.removeItem('lamgen_workflow');
}

function shareWorkflow() {
    // Share current workflow
    if (currentWorkflow.length > 0) {
        const workflowUrl = window.location.origin + '/workflow/' + btoa(JSON.stringify(currentWorkflow));
        
        // Copy to clipboard
        navigator.clipboard.writeText(workflowUrl).then(() => {
            // Show success message
            const container = document.getElementById('workflow-container');
            const message = document.createElement('div');
            message.className = 'workflow-shared';
            message.innerHTML = '<i class="bi bi-share"></i> Workflow link copied to clipboard!';
            container.appendChild(message);
            
            setTimeout(() => {
                if (message.parentNode) {
                    message.parentNode.removeChild(message);
                }
            }, 3000);
        });
    }
}

function addToWorkflow(tool) {
    // Add tool to current workflow
    currentWorkflow.push({
        tool: tool,
        timestamp: Date.now()
    });
    
    // Update UI
    renderWorkflowOptions(currentWorkflow.map(w => w.tool));
    updateWorkflowActions();
}

// Load saved workflow on page load
document.addEventListener('DOMContentLoaded', function() {
    const savedWorkflow = localStorage.getItem('lamgen_workflow');
    if (savedWorkflow) {
        try {
            currentWorkflow = JSON.parse(savedWorkflow);
            renderWorkflowOptions(currentWorkflow.map(w => w.tool));
            updateWorkflowActions();
        } catch (error) {
            console.error('Error loading saved workflow:', error);
        }
    }
});
</script>
